// ENGINE
// ═══════════════════════════════════════════════════════════════
// Hard boundaries for personal inputs. Values outside these ranges
// produce NaN/Infinity or nonsense in the engine. Silent clamp on write.
// Soft "unusual but legal" warnings live in NumInput's RANGES amber system.
const PERSONAL_CLAMPS = {
  rentBudget: [0, 100000],
  buyBudget: [0, 100000],
  downPayment: [0, 10000000],
  mortgageTerm: [1, 50],
  holdingPeriod: [1, 100],
  simYears: [5, 100],
  discipline: [0, 1],
  otherItemized: [0, 1000000],
};
const clampPersonal = (p) => {
  const out = {...p};
  for (const k in PERSONAL_CLAMPS) {
    const v = out[k];
    if (v != null && !isNaN(v)) {
      const [lo, hi] = PERSONAL_CLAMPS[k];
      out[k] = Math.max(lo, Math.min(hi, v));
    }
  }
  // holdingPeriod cannot exceed simYears (dependent bound)
  if (out.simYears != null && out.holdingPeriod != null) {
    out.holdingPeriod = Math.min(out.holdingPeriod, out.simYears);
  }
  return out;
};

function backsolveLoan(monthlyPayment, annualRate, termYears) {
  const r = annualRate / 12;
  const n = termYears * 12;
  if (r <= 0) return monthlyPayment * n;
  const rn = Math.pow(1 + r, n);
  return monthlyPayment * (rn - 1) / (r * rn);
}

function simulate(p) {
  const loan = p.homePrice * (1 - p.downPct);
  const downPayment = p.homePrice * p.downPct;
  const closingCosts = p.homePrice * p.closingPct;
  const upfront = downPayment + closingCosts;
  const mr = p.mortgageRate / 12;
  const nPmts = p.mortgageTerm * 12;
  const monthlyPmt = loan > 0 && mr > 0
    ? loan * (mr * Math.pow(1 + mr, nPmts)) / (Math.pow(1 + mr, nPmts) - 1)
    : loan > 0 ? loan / nPmts : 0;
  const startRent = p.startRent != null ? p.startRent : monthlyPmt;

  let balance = loan;
  let renterPortfolio = upfront;
  let renterBasis = upfront;
  let buyerPortfolio = 0;
  let buyerBasis = 0;
  let totalBuyerUnrecoverable = 0;
  let totalRenterUnrecoverable = 0;
  const data = [];

  for (let yr = 1; yr <= p.simYears; yr++) {
    const homeVal = p.homePrice * Math.pow(1 + p.appreciation, yr);
    const prevHomeVal = yr === 1 ? p.homePrice : p.homePrice * Math.pow(1 + p.appreciation, yr - 1);
    let yrInterest = 0, yrPrincipal = 0, yrMtgPmt = 0;
    for (let m = 0; m < 12; m++) {
      if (balance <= 0.01) { balance = 0; break; }
      const mi = balance * mr;
      const mp = Math.min(monthlyPmt - mi, balance);
      yrInterest += mi;
      yrPrincipal += mp;
      yrMtgPmt += mi + mp;
      balance = Math.max(0, balance - mp);
    }
    const propTax = prevHomeVal * p.propTaxRate;
    const hoIns = p.homePrice * p.insRate * Math.pow(1 + p.inflation, yr - 1);
    const maint = homeVal * p.maintRate;
    const totalBuyerCost = yrMtgPmt + propTax + hoIns + maint;
    const itemized = yrInterest + Math.min(propTax, p.saltCap) + p.otherItemized;
    const taxBenefit = Math.max(0, itemized - p.stdDeduction) * p.marginalTax;
    const netBuyerCost = totalBuyerCost - taxBenefit;
    const annualRent = startRent * 12 * Math.pow(1 + p.rentGrowth, yr - 1);
    const rIns = p.renterIns * Math.pow(1 + p.inflation, yr - 1);
    const totalRenterCost = annualRent + rIns;
    totalBuyerUnrecoverable += yrInterest + propTax + hoIns + maint - taxBenefit;
    totalRenterUnrecoverable += totalRenterCost;
    const diff = netBuyerCost - totalRenterCost;
    renterPortfolio *= (1 + p.investReturn);
    buyerPortfolio *= (1 + p.investReturn);
    if (diff > 0) { renterPortfolio += diff * p.discipline; renterBasis += diff * p.discipline; }
    else { buyerPortfolio += Math.abs(diff) * p.discipline; buyerBasis += Math.abs(diff) * p.discipline; }
    const equity = homeVal - balance;
    const sellCosts = homeVal * p.sellingPct;
    const homeGain = Math.max(0, homeVal - sellCosts - p.homePrice);
    const homeTax = Math.max(0, homeGain - p.capGainsExclusion) * p.capGainsRate;
    const buyerInvGain = Math.max(0, buyerPortfolio - buyerBasis);
    const buyerWealth = equity - sellCosts - homeTax + buyerPortfolio - buyerInvGain * p.capGainsRate;
    const renterGain = Math.max(0, renterPortfolio - renterBasis);
    const renterWealth = renterPortfolio - renterGain * p.capGainsRate;
    data.push({
      year: yr, homeVal, balance: Math.max(0, balance), equity,
      yrInterest, yrPrincipal, propTax, hoIns, maint,
      totalBuyerCost, taxBenefit, netBuyerCost,
      annualRent, totalRenterCost,
      renterPortfolio, buyerPortfolio,
      buyerWealth, renterWealth,
      advantage: buyerWealth - renterWealth,
    });
  }
  let breakeven = null;
  for (const d of data) { if (d.advantage >= 0) { breakeven = d.year; break; } }
  return { data, monthlyPmt, startRent, loan, upfront, breakeven, homePrice: p.homePrice, totalBuyerUnrecoverable, totalRenterUnrecoverable };
}

// HELPERS

const fmtC = (v, s = "$") => {
  if (v == null || isNaN(v)) return "—";
  const abs = Math.abs(v); const sign = v < 0 ? "-" : "";
  if (abs >= 1e6) return sign + s + (abs / 1e6).toFixed(1) + "M";
  if (abs >= 1e3) return sign + s + Math.round(abs).toLocaleString();
  return sign + s + Math.round(abs);
};
const fmtFullC = (v, s = "$") => v == null ? "—" : (v < 0 ? "-" : "") + s + Math.round(Math.abs(v)).toLocaleString();
const fmtPct = v => (v * 100).toFixed(1) + "%";

function buildParams(country, metro, personal, rateOverride) {
  const c = COUNTRIES[country];
  const d = c.defaults;
  const nat = c.national;
  const rate = rateOverride ?? d.mortgageRate;
  const term = personal.mortgageTerm ?? d.mortgageTerm;
  const mp = personal.buyBudget ?? personal.monthlyPayment ?? 2000;
  const loan = backsolveLoan(mp, rate, term);
  const homePrice = loan + personal.downPayment;
  const downPct = homePrice > 0 ? personal.downPayment / homePrice : 0;
  const rentBudget = personal.rentBudget ?? mp;
  return {
    homePrice, downPct, mortgageRate: rate, mortgageTerm: term,
    appreciation: metro?.appreciation5yr ?? nat.appreciation5yr,
    rentGrowth: metro?.rentGrowth ?? nat.rentGrowth,
    inflation: d.inflation, investReturn: d.investReturn,
    propTaxRate: metro?.propTaxRate ?? nat.propTaxRate,
    maintRate: nat.maintRate,
    insRate: metro?.insRate ?? nat.insRate,
    marginalTax: d.marginalTax, stdDeduction: d.stdDeduction,
    saltCap: d.saltCap, otherItemized: personal.otherItemized ?? 0,
    capGainsRate: d.capGainsRate, capGainsExclusion: d.capGainsExclusion,
    sellingPct: d.sellingPct, closingPct: d.closingPct,
    renterIns: d.renterIns, discipline: personal.discipline ?? 1.0,
    simYears: personal.simYears ?? 30,
    holdingPeriod: personal.holdingPeriod ?? 15,
    startRent: rentBudget,
  };
}

function runSensitivity(params, hp) {
  const idx = Math.min(hp, params.simYears) - 1;
  const base = simulate(params).data[idx]?.advantage ?? 0;
  return [
    { name:"Investment Return", key:"investReturn", delta:0.01, fmt:"±1%" },
    { name:"Home Appreciation", key:"appreciation", delta:0.01, fmt:"±1%" },
    { name:"Mortgage Rate", key:"mortgageRate", delta:0.01, fmt:"±1%" },
    { name:"Rent Growth", key:"rentGrowth", delta:0.01, fmt:"±1%" },
    { name:"Property Tax", key:"propTaxRate", delta:0.005, fmt:"±0.5%" },
    { name:"Investment Discipline", key:"discipline", delta:0.10, fmt:"±10%" },
  ].map(t => {
    const upA = simulate({...params,[t.key]:params[t.key]+t.delta}).data[idx]?.advantage ?? 0;
    const dnA = simulate({...params,[t.key]:params[t.key]-t.delta}).data[idx]?.advantage ?? 0;
    return { ...t, upA, dnA, swing:Math.abs(upA-dnA), base };
  }).sort((a,b) => b.swing-a.swing);
}
function encodeURL(s) { try { return window.location.pathname+"#"+btoa(JSON.stringify(s)); } catch { return window.location.pathname; } }
function decodeURL() { try { const h=window.location.hash; return h.length>1 ? JSON.parse(atob(h.slice(1))) : null; } catch { return null; } }
function verdictLabel(adv, hp) {
  const pct=hp>0?Math.abs(adv)/hp:0, d=adv>=0?"Buy":"Rent";
  if (pct<0.02) return { text:"Too close to call", color:"#6C757D" };
  if (pct<0.05) return { text:`Marginal ${d}`, color:adv>=0?"#60a5fa":"#86efac" };
  if (pct<0.15) return { text:d, color:adv>=0?"#2563eb":"#16a34a" };
  return { text:`Strong ${d}`, color:adv>=0?"#1d4ed8":"#15803d" };
}

const Tip = ({text, children}) => {
  const [show,setShow] = useState(false);
  useEffect(()=>{if(show){const t=setTimeout(()=>setShow(false),8000);return()=>clearTimeout(t);}},[show]);
  if (!text) return children;
  return <div>
    <span onClick={e=>{e.preventDefault();setShow(!show);}} style={{cursor:"help"}}>
      {children}{'\u00A0'}<span style={{fontSize:10,color:T.accent,fontWeight:700}}>?</span>
    </span>
    {show&&<div style={{fontSize:11,lineHeight:1.6,color:T.bg,background:T.text1,padding:"8px 12px",borderRadius:8,marginTop:4,marginBottom:4,maxWidth:"100%",fontWeight:400}} onClick={()=>setShow(false)}>{text} <span style={{fontSize:9,color:T.text3}}>(tap to close)</span></div>}
  </div>;
};

const NumInput = ({label,hint,value,onChange,step,prefix,suffix,locked,rangeKey,tip,sliderMin,sliderMax,noSlider}) => {
  const r=RANGES[rangeKey], tipText=tip||TIPS[rangeKey]||"";
  const sMin=sliderMin!=null?sliderMin:(r?r.lo*100:null), sMax=sliderMax!=null?sliderMax:(r?r.hi*100:null);
  const hasBounds=sMin!=null&&sMax!=null&&!locked;
  const hasSlider=hasBounds&&!noSlider;
  const v=parseFloat(value), oob=hasBounds&&!isNaN(v)&&(v<sMin||v>sMax);
  const iStyle=locked?S.inputLock:oob?{...S.input,borderColor:"#f59e0b",boxShadow:"0 0 0 2px rgba(245,158,11,0.15)"}:S.input;
  return <div>
    <div style={S.inputRow}>
      <Tip text={tipText}><span style={S.label}>{label}{locked&&<span style={{color:T.text3,fontSize:9}}> 🔒</span>}</span></Tip>
      <div style={{display:"flex",alignItems:"center",gap:3}}>
        {prefix&&<span style={{fontSize:12,color:T.text3,fontWeight:500}}>{prefix}</span>}
        <input style={iStyle} type="number" inputMode="decimal" autoComplete="off" value={value} step={step||1} readOnly={locked} tabIndex={locked?-1:0}
          onChange={e=>{if(!locked){const val=parseFloat(e.target.value);if(!isNaN(val))onChange(val);}}} />
        {suffix&&<span style={{fontSize:12,color:T.text3,fontWeight:500}}>{suffix}</span>}
      </div>
    </div>
    {hasSlider&&<input type="range" aria-label={label} min={sMin} max={sMax} step={parseFloat(step)||0.1} value={Math.max(sMin,Math.min(sMax,v||0))} onChange={e=>onChange(parseFloat(e.target.value))} style={{background:`linear-gradient(to right, ${T.accent}44 0%, ${T.accent}88 ${sMax>sMin?((Math.max(sMin,Math.min(sMax,v||0))-sMin)/(sMax-sMin))*100:50}%, ${T.slider} ${sMax>sMin?((Math.max(sMin,Math.min(sMax,v||0))-sMin)/(sMax-sMin))*100:50}%, ${T.slider} 100%)`}}/>}
    {oob&&<div style={{fontSize:9,color:"#f59e0b",fontWeight:600,marginBottom:2}}>Outside typical range ({sMin}–{sMax})</div>}
    {hint&&<div style={S.hint}>{hint}</div>}
  </div>;
};

  const v=verdictLabel(advantage,homePrice);

// Accordion behavior: when a <details> opens, close all its siblings at the same DOM level.
// Generalized — works for any number of sibling details inside the same parent.
const accordionToggle = (e) => {
  if (!e.target.open) return;
  const parent = e.target.parentElement;
  if (!parent) return;
  parent.querySelectorAll(":scope > details").forEach(d => { if (d !== e.target) d.open = false; });
};

// Reset behavior: when a <details> opens, force-close all nested <details> inside it.
// Fires on open rather than close so the browser's freshly-laying-out-visible-content pass sees the collapsed state.
// (Firing on close caused a WebKit layout-cache bug where the next reopen reserved stale expanded-height space.)
// Used on the outer Guide so every reopen starts from a known collapsed state for the Glossary subsections.
const resetNestedDetails = (e) => {
  if (!e.target.open) return;
  e.target.querySelectorAll("details").forEach(d => { d.open = false; });
};

function RentVsBuyV3() {
  const saved=useMemo(()=>decodeURL(),[]);
  const [country,setCountry]=useState(saved?.c||"US");

  const [cusPresetId,setCusPresetId]=useState(null);
  const [scenOvr,setScenOvr]=useState(saved?.so||{});
  const [cusOvr,setCusOvr]=useState(saved?.co||{});
  const [chartType,setChartType]=useState("networth");

  useEffect(()=>setChartDescOpen(true),[chartType]);

  useEffect(()=>{

  },[theme]);

  const c=COUNTRIES[country],sym=c.sym,cur=c.currency;

  const fxRate=fxOverride!=null?fxOverride:(CURRENCIES[cur]?.rate||1);
  const toUSD=v=>cur!=="USD"?" (≈ $"+Math.round(v*fxRate).toLocaleString()+" USD)":"";
  const countryMetros=METROS.filter(m=>m.country===country);
  const findM=id=>METROS.find(m=>m.id===id)||null;

  const [personal,setPersonal]=useState(()=>{
    const s=saved?.p||{};
    // Backward compat: old URLs have monthlyPayment → map to both budgets
    const mp=s.monthlyPayment;
    return clampPersonal({
      rentBudget:s.rentBudget??mp??c.personalDefaults.monthlyPayment,
      buyBudget:s.buyBudget??mp??c.personalDefaults.monthlyPayment,
      downPayment:s.downPayment??c.personalDefaults.downPayment,
      mortgageTerm:s.mortgageTerm??c.defaults.mortgageTerm,
      holdingPeriod:s.holdingPeriod??15,
      simYears:s.simYears??(c.defaults.mortgageTerm+5),
      discipline:s.discipline??0.65,
      otherItemized:s.otherItemized??0,
    });
  });
  const [budgetLinked,setBudgetLinked]=useState(()=>!saved?.p||saved.p.rentBudget==null||saved.p.rentBudget===saved.p.buyBudget);
  const up=key=>val=>setPersonal(prev=>clampPersonal({...prev,[key]:val}));
  const hp=personal.holdingPeriod;
  const eLocA=linked?null:findM(locAMetro), eLocB=findM(locBMetro);

  const locAP=useMemo(()=>buildParams(country,eLocA,personal),[country,eLocA,personal]);
  const locBP=useMemo(()=>buildParams(country,eLocB,personal),[country,eLocB,personal]);

  const cusP=useMemo(()=>{const r=cusOvr.mortgageRate;const b=buildParams(country,eLocB,personal,r);const{mortgageRate:_,...rest}=cusOvr;return{...b,...rest};},[country,eLocB,personal,cusOvr]);

  const cusR=useMemo(()=>simulate(cusP),[cusP]);

  const gh=(r,p)=>r.data[Math.min(hp,p.simYears)-1];
  const locAH=gh(locAR,locAP),locBH=gh(locBR,locBP),scenH=gh(scenR,scenP),cusH=gh(cusR,cusP);

  const chartData=useMemo(()=>cusR.data.map((d,i)=>({
    year:d.year, locA:locAR.data[i]?.advantage, locB:locBR.data[i]?.advantage,
    scen:scenR.data[i]?.advantage, cus:d.advantage,
    cusBuyer:d.buyerWealth, cusRenter:d.renterWealth,
    locABuyer:locAR.data[i]?.buyerWealth, locARenter:locAR.data[i]?.renterWealth,
    locBBuyer:locBR.data[i]?.buyerWealth, locBRenter:locBR.data[i]?.renterWealth,
    scenBuyer:scenR.data[i]?.buyerWealth, scenRenter:scenR.data[i]?.renterWealth,
    cusNetBuyer:d.netBuyerCost, cusRenterCost:d.totalRenterCost,

  })),[locAR,locBR,scenR,cusR]);

  const sensitivity=useMemo(()=>runSensitivity(cusP,hp),[cusP,hp]);
  const topSens=sensitivity[0];
  const beSens=useMemo(()=>{const lo=simulate({...cusP,appreciation:cusP.appreciation-0.01});const hi=simulate({...cusP,appreciation:cusP.appreciation+0.01});return{lo:lo.breakeven,hi:hi.breakeven};},[cusP]);

  // Rich bottom line insights
  const insights = useMemo(() => {
    const adv=cusH?.advantage||0, abs=Math.abs(adv), up=cusR.upfront||1, roiPct=(abs/up*100).toFixed(0), ins=[];
    const hp2=cusR.homePrice||1, verdictPct=abs/hp2;
    // Gate confidence by verdict strength
    if (verdictPct>=0.15) {
      ins.push({icon:"🟢",text:`Robust — ${roiPct}% ROI advantage is strong relative to home value (${(verdictPct*100).toFixed(0)}%).`});
    } else if (verdictPct>=0.05) {
      // Moderate verdict: cap at 🟡
      if (topSens && topSens.swing>abs) {
        ins.push({icon:"🟡",text:`Moderate but sensitive — ${topSens.name.toLowerCase()} (${topSens.fmt}) could narrow or widen this ${roiPct}% advantage.`});
      } else {
        ins.push({icon:"🟢",text:`Robust — no single variable swing exceeds your ${roiPct}% ROI advantage.`});
      }
    } else {
      // Marginal/too-close: full sensitivity
      if (sensitivity.length>=2 && sensitivity[0].swing>abs && sensitivity[1].swing>abs) {
        ins.push({icon:"🔴",text:`Highly assumption-dependent — both ${sensitivity[0].name.toLowerCase()} and ${sensitivity[1].name.toLowerCase()} could each independently flip this verdict.`});
      } else if (topSens && topSens.swing>abs) {
        ins.push({icon:"🟡",text:`Fragile — ${topSens.name.toLowerCase()} (${topSens.fmt}) swings the outcome by ${(topSens.swing/up*100).toFixed(0)}% of capital, exceeding your ${roiPct}% advantage.`});
      } else {
        ins.push({icon:"🟢",text:`Robust — no single variable swing exceeds your ${roiPct}% ROI advantage.`});
      }
    }
    if (cusR.breakeven && Math.abs(cusR.breakeven-hp)<=2) ins.push({icon:"⏱",text:`First break-even (yr ${cusR.breakeven}) is close to your sell year (${hp}). ±1 year materially changes the outcome.`});
    if (personal.discipline>=0.99) ins.push({icon:"💡",text:`Assuming 100% investment discipline — every dollar of surplus is invested. Try 70% for a reality check.`});
    if (cusP.investReturn < cusP.mortgageRate) ins.push({icon:"📌",text:`Portfolio return (${fmtPct(cusP.investReturn)}) is below mortgage rate (${fmtPct(cusP.mortgageRate)}). This fundamentally favors buying.`});
    if (cusP.appreciation > 0.06) ins.push({icon:"⚠",text:`Assuming ${fmtPct(cusP.appreciation)} appreciation — above long-term norms. Even 1% less shifts the math significantly.`});
    return ins;
  },[cusH,sensitivity,topSens,cusR,cusP,personal,hp,f,ff]);

  const warnings=useMemo(()=>{
    const w=[],cp=cusP,dp=cp.homePrice>0?personal.downPayment/cp.homePrice:0;

    if(!budgetLinked&&Math.abs(personal.rentBudget-personal.buyBudget)/(personal.buyBudget||1)>0.10)w.push("Rent and mortgage P&I differ by >10%.");

                <button onClick={()=>setTheme(k)} aria-label={`${v.name} theme`} aria-pressed={active} className="compact" style={{width:active?"auto":20,height:20,borderRadius:10,border:active?`2px solid ${v.accent}`:`2px solid ${T.border}`,background:active?v.card:v.accent,cursor:"pointer",fontSize:9,fontWeight:600,color:active?v.text1:"transparent",padding:active?"0 7px":0,display:"flex",alignItems:"center",justifyContent:"center",transition:"all 200ms",overflow:"hidden"}}>{active?v.name:""}</button>
              </React.Fragment>;

          <div role="switch" aria-checked={tutorial} tabIndex={0} onClick={()=>setTutorial(!tutorial)} onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();setTutorial(!tutorial);}}} style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",background:`${T.accent}0F`,border:`1px solid ${T.accent}44`,borderRadius:6,padding:"4px 12px"}} title="Toggle step-by-step tutorial">

          <div style={{padding:"16px 20px",fontSize:13,lineHeight:1.8,color:T.text2}}>
            {guideTab==="overview"&&<>
              <p><strong style={{color:T.text1}}>What this model does:</strong> Compares two parallel wealth paths — buying a home vs. renting and investing the difference. At your chosen time horizon, it calculates total net wealth after taxes, transaction costs, and capital gains.</p>
              <p style={{marginTop:8}}><strong style={{color:T.text1}}>The core premise:</strong> You set a monthly Rent Payment and Mortgage P&I (linked by default for an apples-to-apples comparison). The buyer's home price is derived from P&I + down payment. Total buyer cost includes tax, insurance, and maintenance on top. The renter invests the down payment and any monthly surplus.</p>
              <p style={{marginTop:8}}><strong style={{color:T.text1}}>Panels:</strong> <em>Location</em> = real locked market data for two locations. <em>Your Assumptions</em> = fully editable sandbox. <em>What-If</em> (optional) = preset market conditions (12 options). All use the same simulation engine.</p>
              <p style={{marginTop:8}}><strong style={{color:T.text1}}>Snapshots, not transitions:</strong> Each year is an independent "if I sold now" evaluation. Year 15 does NOT model selling then renting — it shows total wealth if you liquidated at that point.</p>
              <p style={{marginTop:8}}><strong style={{color:T.text1}}>Quick start:</strong> Set your "Rent Payment" and "Mortgage P&I" (linked by default), your savings as "Down Payment," and how long you'd stay. Tap any <span style={{color:T.accent,fontWeight:700}}>?</span> for details.</p>
            </>}
            {guideTab==="method"&&<>
              <p><strong style={{color:T.text1}}>Payment-First Architecture:</strong> Input monthly P&I + down payment. Engine backsolves: L = M × [(1+r)^n − 1] / [r × (1+r)^n]. Home price = L + down. Rent Payment can be set independently or linked to P&I for apples-to-apples comparison.</p>
              <p style={{marginTop:8}}><strong style={{color:T.text1}}>Month-Precise Amortization:</strong> Interest = Balance × (Rate/12), Principal = Payment − Interest. Matches bank schedules exactly.</p>
              <p style={{marginTop:8}}><strong style={{color:T.text1}}>Tax Benefit — Excess Itemization (post-TCJA):</strong> max(0, Itemized − Std Deduction) × Rate. The $30K MFJ standard deduction means most homeowners get $0 incremental benefit. This is the #1 error in online calculators. Non-US countries correctly produce $0 (marginalTax = 0). NL/SE have partial deductions.</p>
              <p style={{marginTop:8}}><strong style={{color:T.text1}}>Symmetric Surplus Investing:</strong> BOTH buyer and renter invest surplus cash. After mortgage payoff, the buyer's freed-up cash gets invested — not ignored like in most calculators.</p>
              <p style={{marginTop:8}}><strong style={{color:T.text1}}>Geometric Returns (10%, not 12%):</strong> Volatility drag: g ≈ a − σ²/2. With σ ≈ 20%, stocks lose ~2% to compounding friction. 10% CAGR is mathematically correct for deterministic models. 12% overstates by ~50% over 30 years. (Jacquier, Kane, Marcus FAJ 2003)</p>
              <p style={{marginTop:8}}><strong style={{color:T.text1}}>Verdict Confidence:</strong> |advantage| / home price. &lt;2% too close, &lt;5% marginal, &lt;15% moderate, ≥15% strong.</p>
              <p id="felix" style={{marginTop:8}} className={methodHighlight==="felix"?"target-highlight":""}><strong style={{color:T.text1}}>Heuristic cross-check (Felix 5% rule):</strong> The Confidence card displays break-even rent ≈ 5% of home value per year. Ben Felix (PWL Capital) aggregates property tax, maintenance, cost of capital, and net appreciation into this single number — a quick directional check against more detailed models. It's a US-calibrated shorthand; non-US markets with different tax structures, rent controls, or appreciation rates may deviate. Felix is a second opinion, not a replacement for the full simulation.</p>
            </>}
            {guideTab==="limits"&&<>
              <p style={{fontWeight:600,color:T.text1,fontSize:14,marginBottom:8}}>Full Research Reports</p>
              <div style={{marginBottom:12}}>
                {RESEARCH_FILES.map((rf,i)=><div key={i} style={{marginBottom:4}}><a href={RESEARCH_BASE+rf.file} target="_blank" rel="noopener" style={{color:T.accent,fontWeight:500,textDecoration:"none"}}>{rf.name}</a></div>)}
              </div>
              <p style={{fontWeight:600,color:T.text1}}>What's NOT captured:</p>
              <p style={{marginTop:6}}><strong style={{color:T.text1}}>Favors buying:</strong> Refinancing optionality, HELOC access, home improvements, emotional stability, forced savings beyond principal.</p>
              <p style={{marginTop:4}}><strong style={{color:T.text1}}>Favors renting:</strong> PMI below 20% down, liquidity risk, concentration risk, career flexibility, maintenance variance, state renter deductions (MA ~$880/yr).</p>
              <p style={{marginTop:4}}><strong style={{color:T.text1}}>Net:</strong> Omissions roughly balance. Young mobile renters benefit from uncaptured flexibility. Settled buyers benefit from uncaptured forced savings.</p>
              <p style={{marginTop:8,fontSize:11,color:T.text3}}>Poterba (QJE 1984) · Shiller · Jordà-Schularick-Taylor (QJE 2019) · Himmelberg-Mayer-Sinai (JEP 2005) · Gallin (Fed 2004) · Bernstein-Koudijs (QJE 2024) · Ben Felix / PWL · Jacquier-Kane-Marcus (FAJ 2003) · UBS Bubble Index 2025</p>
              <p style={{marginTop:6,fontSize:11,fontWeight:700,color:T.text1,background:`${T.accent}15`,padding:"6px 10px",borderRadius:4,border:`1px solid ${T.accent}33`}}>Educational only. Not financial advice. <a href={RESEARCH_BASE+"legal_disclaimers.md"} target="_blank" rel="noopener" style={{color:T.accent}}>Full Legal Disclaimers</a> · <a href={RESEARCH_BASE+"LICENSE"} target="_blank" rel="noopener" style={{color:T.accent}}>MIT License</a></p>
            </>}
            {guideTab==="faq"&&<>
              <p style={{fontWeight:600,color:T.text1,fontSize:14,marginBottom:6}}>Common Questions & Different Approaches</p>
              <p style={{fontSize:11,color:T.text3,marginBottom:12}}>7 key questions below · <a href={RESEARCH_BASE+"FAQ.md"} target="_blank" rel="noopener" style={{color:T.accent,fontWeight:600,textDecoration:"none"}}>Full FAQ with 115 research-backed questions on GitHub</a> (use Ctrl+F to search)</p>

              <p><strong style={{color:T.text1}}>"Why not just compare investment returns vs. home appreciation?"</strong></p>
              <p style={{marginTop:4}}>Because that misses the three biggest forces: leverage (you control a $400K asset with $80K down — a 5× multiplier), transaction costs (6% selling + 3% closing = ~$36K on that same home), and tax treatment ($500K cap gains exclusion on a primary residence vs. 15% on investment profits). A pure returns comparison omits all three.</p>

              <p style={{marginTop:12}}><strong style={{color:T.text1}}>"Shouldn't taxes just be excluded? They change too often."</strong></p>
              <p style={{marginTop:4}}>Taxes don't change the direction as much as people expect — but the $500K primary residence exclusion is massive and stable (enacted 1997, unchanged since). The real issue is the mortgage interest deduction: post-TCJA, the $30K standard deduction means most homeowners get $0 incremental tax benefit. This model captures that correctly. Most online calculators don't.</p>

              <p style={{marginTop:12}}><strong style={{color:T.text1}}>"Why does renting win so often at default settings?"</strong></p>
              <p style={{marginTop:4}}>Two reasons. First, the default assumes 65% investment discipline — a realistic middle ground. Try 50% for a reality check or 75% for an optimistic case. Second, at current mortgage rates (~6%), there's a 4% spread between what stocks return (10% CAGR) and what the mortgage costs. That gap compounds. Change either rate and watch the verdict flip.</p>

              <p style={{marginTop:12}}><strong style={{color:T.text1}}>"I did my own math and got different numbers."</strong></p>
              <p style={{marginTop:4}}>Great — check which variables differ. The sensitivity chart (chart dropdown → "Input Sensitivity") shows which single assumption drives your result. Usually it's investment return, appreciation, or discipline. If your algebra gives the same core equation (down payment compounded vs. home appreciation + monthly surplus compounded), you've independently validated the model. The simulation adds month-precise amortization, tax treatment, and transaction costs on top of that foundation.</p>

              <p style={{marginTop:12}}><strong style={{color:T.text1}}>"$3K/month in rent gets a nicer place than $3K/month on a mortgage."</strong></p>
              <p style={{marginTop:4}}>True in many markets, especially in 2024–2026 with rates above 6%. That's the "imputed rent" gap — the owner consumes housing services worth more than their payment buys. This model isolates the <em>financial</em> question only: which path builds more wealth? Quality-of-life differences (space, stability, customization, landlord risk) are real but not quantifiable. They're documented in "What the Model Doesn't Capture" on GitHub.</p>

              <p style={{marginTop:12}}><strong style={{color:T.text1}}>"Can I trust a model this simple?"</strong></p>
              <p style={{marginTop:4}}>It's not simple — it runs 780 monthly amortization steps per simulation, multiple scenarios simultaneously, and 12 sensitivity perturbations. What it IS is transparent: every assumption is editable, every default is sourced, and every formula is documented. The academic foundations (Poterba, Jordà, Bernstein-Koudijs) are linked in Sources. The full math audit is on GitHub. Verify anything you want.</p>

              <p style={{marginTop:12}}><strong style={{color:T.text1}}>"What should I actually do with this?"</strong></p>
              <p style={{marginTop:4}}>Enter YOUR numbers (real rent, real savings, real timeline). Look at the verdict. Then break it: slide the discipline to 70%, try a different rate, change the sell year. The goal isn't to get one answer — it's to understand which assumptions your decision depends on and how sensitive it is to being wrong about them.</p>
            </>}

      </div>

      {/* VERDICT CALLOUT — between inputs and chart */}
      {tutorial&&<div className="tut"><b>4</b>Your result — one sentence telling you who wins, by how much, and whether the verdict is robust or fragile. The colored icons (🟢🟡🔴) rate confidence.</div>}
      <div style={{...S.card,background:cusH?.advantage>=0?`${T.accent}0A`:`${T.green}0A`,borderColor:cusH?.advantage>=0?T.accent:T.green}}>
        {(()=>{
          const adv=cusH?.advantage||0, abs=Math.abs(adv), up=cusR.upfront||1;
          const bw=cusH?.buyerWealth||0, rw=cusH?.renterWealth||0;
          const bRoi=((bw-up)/up*100), rRoi=((rw-up)/up*100);
          const bCagr=((Math.pow(Math.max(0.01,bw/up),1/hp)-1)*100);
          const rCagr=((Math.pow(Math.max(0.01,rw/up),1/hp)-1)*100);
          const diffRoi=Math.abs(bRoi-rRoi).toFixed(1), diffCagr=Math.abs(bCagr-rCagr).toFixed(1);
          const winner=adv>=0?"Buying":"Renting";
          const wColor=adv>=0?T.accent:T.green, lColor=adv>=0?T.green:T.accent;
          return <div style={{textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,marginBottom:4}}>
              {winner} wins by {diffRoi}% ROI
              <span style={{fontSize:14,fontWeight:600,color:T.text2}}> ({diffCagr}%/yr)</span>
            </div>
            <div style={{fontSize:13,color:T.text3,marginBottom:10}}>
              {ff(abs)} advantage at year {hp} on {ff(Math.round(up))} invested capital
              {toUSD(abs)&&<span>{toUSD(abs)}</span>}
            </div>
            <div style={{fontSize:13,color:T.text2,lineHeight:1.8}}>
              <div><span style={{fontWeight:600,color:wColor}}>{winner}:</span> {ff(Math.round(adv>=0?bw:rw))} total wealth · {(adv>=0?bRoi:rRoi).toFixed(1)}% ROI ({(adv>=0?bCagr:rCagr).toFixed(1)}%/yr)</div>
              <div><span style={{fontWeight:600,color:lColor}}>{adv>=0?"Renting":"Buying"}:</span> {ff(Math.round(adv>=0?rw:bw))} total wealth · {(adv>=0?rRoi:bRoi).toFixed(1)}% ROI ({(adv>=0?rCagr:bCagr).toFixed(1)}%/yr)</div>
            </div>
          </div>;
        })()}
        <div style={{marginTop:8,fontSize:10,fontWeight:700,color:T.text1,background:`${T.accent}15`,padding:"6px 10px",borderRadius:4,border:`1px solid ${T.accent}33`,fontStyle:"italic",textAlign:"center"}}>For educational purposes only. Not financial, tax, or investment advice. <a href={RESEARCH_BASE+"legal_disclaimers.md"} target="_blank" rel="noopener" style={{color:T.accent}}>Legal</a> · <a href={RESEARCH_BASE+"LICENSE"} target="_blank" rel="noopener" style={{color:T.accent}}>MIT License</a></div>
      </div>

      {/* CONFIDENCE & WARNINGS */}
      {(()=>{
        const conf=insights[0]?.icon;
        const hasWarn=warnings.length>0||c.taxNote.includes("\u26A0\uFE0F");
        const isRed=conf==="\uD83D\uDD34"||(warnings.length>=2);
        const isYellow=conf==="\uD83D\uDFE1"||hasWarn;
        const wColor2=isRed?"#dc2626":isYellow?"#d97706":T.green;
        const wBg=isRed?"#fef2f2":isYellow?"#fef3c7":`${T.green}0A`;
        const wBorder=isRed?"#fca5a5":isYellow?"#f59e0b":`${T.green}44`;
        return <div style={{...S.card,background:wBg,borderColor:wBorder,marginBottom:16,textAlign:"center"}}>
          <div style={{fontSize:10,fontWeight:700,color:T.text2,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Confidence &amp; Warnings</div>
          {insights.map((ins,i)=><div key={i} style={{fontSize:13,marginBottom:4,color:T.text1,lineHeight:1.6}}>
            {ins.icon} {ins.text}
            {ins.icon==="\uD83D\uDFE2"&&<div style={{fontSize:11,color:T.text3,marginTop:2}}>The sensitivity chart below confirms that no single variable swing exceeds your advantage.</div>}
            {ins.icon==="\uD83D\uDFE1"&&<div style={{fontSize:11,color:T.text3,marginTop:2}}>Check the sensitivity chart below — the top variable can flip the verdict with a small change.</div>}
            {ins.icon==="\uD83D\uDD34"&&<div style={{fontSize:11,color:T.text3,marginTop:2}}>Multiple variables could each independently change the outcome. Non-financial factors should weigh heavily.</div>}
          </div>)}
          {(()=>{
            const felixBE=Math.round(cusR.homePrice*0.05/12);
            const userRent=Math.round(personal.rentBudget);
            if(felixBE<=0||userRent<=0)return null;
            const diffPct=(userRent-felixBE)/felixBE;
            let verdictText,verdictColor;
            if(Math.abs(diffPct)<0.10){verdictText="close to the threshold";verdictColor=T.text2;}
            else if(diffPct<0){verdictText=`${Math.abs(diffPct*100).toFixed(0)}% below → renting favored`;verdictColor=T.green;}
            else{verdictText=`${(diffPct*100).toFixed(0)}% above → buying favored`;verdictColor=T.accent;}
            return <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${T.border}60`,fontSize:11,color:T.text2,lineHeight:1.5}}>
              <strong style={{color:T.text1}}>Felix 5% rule:</strong> break-even rent ~{ff(felixBE)}/mo · Yours {ff(userRent)}/mo <span style={{color:verdictColor,fontWeight:600}}>({verdictText})</span>
              <div style={{fontSize:10,color:T.text3,marginTop:2}}>Heuristic only — simulation above accounts for appreciation, taxes, and your discipline. <span onClick={()=>{setGuideTab("method");if(guideRef.current){guideRef.current.open=true;setTimeout(()=>{const el=document.getElementById("felix");if(el)el.scrollIntoView({behavior:"smooth",block:"center"});setMethodHighlight("felix");setTimeout(()=>setMethodHighlight(null),3000);},50);}}} style={{color:T.accent,cursor:"pointer",textDecoration:"underline",fontWeight:600}}>What is Felix?</span></div>
            </div>;
          })()}
          {Math.abs(cusH?.advantage)>200000&&personal.discipline>=0.99&&<div style={{fontSize:12,color:T.text3,marginTop:6,padding:"6px 10px",background:T.muted,borderRadius:6,lineHeight:1.6}}>Why so large? At 100% discipline, the ~{((cusP.investReturn-cusP.mortgageRate)*100).toFixed(0)}% spread compounds over {hp} years. Try discipline at 70% for a reality check.</div>}
          {c.taxNote.includes("\u26A0\uFE0F")&&<div style={{marginTop:6,fontSize:11,color:wColor2,lineHeight:1.5}}>{"\u26A0\uFE0F"} {c.name}: {c.taxNote.replace(/\u26A0\uFE0F\s*\w+\s*\w*:\s*/i,"")}</div>}
          {warnings.length>0&&<div style={{marginTop:6,fontSize:11,color:wColor2,lineHeight:1.6}}>{warnings.map((w,i)=><div key={i}>{"\u26A0"} {w}</div>)}</div>}
        </div>;
      })()}

      {/* FX CONVERTER — now inline in Location header (v3.9.99.12) */}

      {/* CHART */}
      {tutorial&&<div className="tut"><b>5</b><span>Visualize the math — the dropdown switches between 4 views. <strong>"Net Worth"</strong> shows all active scenarios side by side (★ = custom). <strong>"Input Sensitivity"</strong> reveals which assumption matters most. Tap <strong>"▸ View Data"</strong> below any chart to see the raw numbers.</span></div>}
      <div style={S.card}>
        <div style={{textAlign:"center",marginBottom:12}}>
          <select style={{...S.select,fontSize:16,fontWeight:700,border:`2px solid ${T.accent}44`,background:`${T.accent}08`,textAlign:"center",cursor:"pointer",color:T.text1,padding:"4px 8px"}} value={chartType} onChange={e=>setChartType(e.target.value)}>
            {Object.entries(CHARTS).map(([k,v])=><option key={k} value={k}>{v.title}</option>)}
          </select>
          <div style={{fontSize:11,color:T.text3,marginTop:4}}>{CHARTS[chartType]?.sub}</div>
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:4,marginTop:6,fontSize:11,color:T.text2}}>
            <span>Simulate</span>
            <input type="number" inputMode="numeric" autoComplete="off" className="compact" value={personal.simYears} min={5} max={100} step={1} style={{...S.input,width:45,fontSize:11,padding:"3px 4px",textAlign:"center"}} onChange={e=>{const v=parseInt(e.target.value);if(!isNaN(v))setPersonal(prev=>clampPersonal({...prev,simYears:v}));}}/>
            <span>years</span>
          </div>
        </div>

        {chartType==="networth"&&<ChartShell data={chartData} sym={sym}>
          <ReferenceLine x={hp} stroke="#f59e0b" strokeDasharray="6 4" strokeWidth={2} label={labelBox(`Sell yr ${hp}`,"#f59e0b")}/>
          {cusR.breakeven&&<ReferenceLine x={cusR.breakeven} stroke="#dc2626" strokeDasharray="4 4" label={labelBox("BE","#dc2626")}/>}
          {cusP.mortgageTerm<=cusP.simYears&&<ReferenceLine x={cusP.mortgageTerm} stroke={T.text3} strokeDasharray="4 4" label={labelBox("Paid off",T.text3)}/>}
          <Line type="monotone" dataKey="cusBuyer" name="★ Buyer" stroke={T.accent} strokeWidth={2.5} dot={false}/>
          <Line type="monotone" dataKey="cusRenter" name="★ Renter" stroke={T.green} strokeWidth={2.5} dot={false}/>
          {showWhatIf&&<Line type="monotone" dataKey="scenBuyer" name="What-If Buyer" stroke={T.purple} strokeWidth={1.5} dot={false}/>}
          {showWhatIf&&<Line type="monotone" dataKey="scenRenter" name="What-If Renter" stroke={T.purple} strokeWidth={1.5} dot={false} strokeDasharray="4 2"/>}
          <Line type="monotone" dataKey="locABuyer" name={`${locALabel} Buyer`} stroke={T.text3} strokeWidth={1} dot={false} strokeDasharray="6 3"/>
          <Line type="monotone" dataKey="locARenter" name={`${locALabel} Renter`} stroke={T.text3} strokeWidth={1} dot={false} strokeDasharray="2 2"/>
          <Line type="monotone" dataKey="locBBuyer" name={`${locBLabel} Buyer`} stroke={T.text3} strokeWidth={1} dot={false} strokeDasharray="8 4" opacity={0.5}/>
          <Line type="monotone" dataKey="locBRenter" name={`${locBLabel} Renter`} stroke={T.text3} strokeWidth={1} dot={false} strokeDasharray="2 4" opacity={0.5}/>
        </ChartShell>}

        {chartType==="cost"&&<ChartShell data={chartData} sym={sym}>
          <ReferenceLine x={hp} stroke="#f59e0b" strokeDasharray="6 4" strokeWidth={2} label={labelBox(`Sell yr ${hp}`,"#f59e0b")}/>
          {cusP.mortgageTerm<=cusP.simYears&&<ReferenceLine x={cusP.mortgageTerm} stroke={T.text3} strokeDasharray="4 4" label={labelBox("Paid off",T.text3)}/>}
          <Line type="monotone" dataKey="cusNetBuyer" name="Buyer Cost" stroke={T.accent} strokeWidth={2} dot={false}/>
          <Line type="monotone" dataKey="cusRenterCost" name="Renter Cost" stroke={T.green} strokeWidth={2} dot={false}/>
        </ChartShell>}

        {chartType==="assets"&&<ChartShell data={chartData} sym={sym}>
          <ReferenceLine x={hp} stroke="#f59e0b" strokeDasharray="6 4" strokeWidth={2} label={labelBox(`Sell yr ${hp}`,"#f59e0b")}/>
          {cusP.mortgageTerm<=cusP.simYears&&<ReferenceLine x={cusP.mortgageTerm} stroke={T.text3} strokeDasharray="4 4" label={labelBox("Paid off",T.text3)}/>}
          <Line type="monotone" dataKey="cusHomeVal" name="Home Value" stroke={T.text3} strokeWidth={1.5} dot={false} strokeDasharray="4 2"/>
          <Line type="monotone" dataKey="cusBalance" name="Mortgage Balance" stroke="#dc2626" strokeWidth={1.5} dot={false}/>
          <Line type="monotone" dataKey="cusEquity" name="Home Equity" stroke={T.accent} strokeWidth={2.5} dot={false}/>
          <Line type="monotone" dataKey="cusRenterInv" name="Renter Portfolio" stroke={T.green} strokeWidth={2.5} dot={false}/>
          <Line type="monotone" dataKey="cusBuyerInv" name="Buyer Portfolio" stroke={T.accent} strokeWidth={1.5} dot={false} strokeDasharray="6 3"/>
        </ChartShell>}

        {chartType==="tornado"&&(()=>{
          const upf=cusR.upfront||1;
          const maxHalf=Math.max(...sensitivity.map(s=>Math.max(Math.abs(s.dnA-s.base),Math.abs(s.upA-s.base))))||1;
          const advLabel=(a)=>{const w=a>=0?"Buy":"Rent";const r=Math.abs(a);return{w,roi:(r/upf*100).toFixed(0),amt:f(r)};};
          return <div style={{padding:"8px 0"}}>
            {sensitivity.map((s,i)=>{
              const dn=s.dnA-s.base, up2=s.upA-s.base;
              const leftW=Math.abs(dn)/maxHalf*48, rightW=Math.abs(up2)/maxHalf*48;
              const leftColor=s.dnA>=0?T.accent:T.green, rightColor=s.upA>=0?T.accent:T.green;
              const dnV=advLabel(s.dnA), upV=advLabel(s.upA);
              return <div key={s.key} style={{marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:75,fontSize:10,textAlign:"right",fontFamily:THEME_MONO}}>
                    <div style={{fontWeight:600,color:s.dnA>=0?T.accent:T.green}}>{dnV.w} {dnV.roi}%</div>
                    <div style={{color:T.text3}}>{dnV.amt}</div>
                  </div>
                  <div style={{width:100,fontSize:12,textAlign:"right",color:T.text1,fontWeight:i===0?700:500}}>{s.name}{i===0&&" ★"}</div>
                  <div style={{flex:1,height:28,position:"relative",background:T.muted,borderRadius:6,cursor:"help"}} onMouseEnter={()=>setHoveredBar(i)} onMouseLeave={()=>setHoveredBar(-1)}>
                    <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:1,background:T.text1+"60"}}/>
                    {leftW>0&&<div style={{position:"absolute",right:"50%",top:3,bottom:3,width:`${Math.min(48,leftW)}%`,background:`${leftColor}30`,borderRadius:"4px 0 0 4px",border:`1px solid ${leftColor}`,pointerEvents:"none"}}/>}
                    {rightW>0&&<div style={{position:"absolute",left:"50%",top:3,bottom:3,width:`${Math.min(48,rightW)}%`,background:`${rightColor}30`,borderRadius:"0 4px 4px 0",border:`1px solid ${rightColor}`,pointerEvents:"none"}}/>}
                    {hoveredBar===i&&<div style={{position:"absolute",top:-54,left:"50%",transform:"translateX(-50%)",background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:"6px 10px",fontSize:10,color:T.text2,whiteSpace:"nowrap",zIndex:10,boxShadow:"0 2px 8px rgba(0,0,0,.15)",lineHeight:1.5,fontFamily:THEME_MONO}}>
                      <div>−{s.fmt.replace("±","")}: <span style={{fontWeight:600,color:s.dnA>=0?T.accent:T.green}}>{dnV.w}</span> by {dnV.amt} ({dnV.roi}% ROI)</div>
                      <div>+{s.fmt.replace("±","")}: <span style={{fontWeight:600,color:s.upA>=0?T.accent:T.green}}>{upV.w}</span> by {upV.amt} ({upV.roi}% ROI)</div>
                      <div style={{color:T.text3}}>Swing: {f(s.swing)}</div>
                    </div>}
                  </div>
                  <div style={{width:75,fontSize:10,textAlign:"left",fontFamily:THEME_MONO}}>
                    <div style={{fontWeight:600,color:s.upA>=0?T.accent:T.green}}>{upV.w} {upV.roi}%</div>
                    <div style={{color:T.text3}}>{upV.amt}</div>
                  </div>
                </div>
              </div>;
            })}
            <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:8,fontSize:11,color:T.text2}}>
              <span>◀ −%</span>
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:`${T.accent}30`,border:`1px solid ${T.accent}`,borderRadius:2,display:"inline-block"}}/>buying</span>
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,background:`${T.green}30`,border:`1px solid ${T.green}`,borderRadius:2,display:"inline-block"}}/>renting</span>
              <span>+% ▶</span>
            </div>
            <div style={{textAlign:"center",fontSize:10,color:T.text3,marginTop:4}}>Hover any bar for full details (desktop only) · % = ROI on {ff(Math.round(upf))} invested capital</div>
          </div>;
        })()}

        {/* EXPANDABLE DATA TABLE — merged into chart */}
        <div style={{borderTop:`1px solid ${T.border}`,marginTop:16,paddingTop:12}}>
          <button onClick={()=>setShowData(!showData)} style={{cursor:"pointer",background:"none",border:`1px solid ${T.border}`,borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:600,color:T.text2,width:"100%",textAlign:"left"}}>
            {showData?"▼ Hide":"▸ View"} Year-by-Year Data ({cusR.data.length} rows · all columns)
          </button>
          {showData && <div style={{maxHeight:400,overflowY:"auto",overflowX:"auto",marginTop:10,WebkitOverflowScrolling:"touch",contentVisibility:"auto",containIntrinsicSize:"auto 400px"}}>
            <div style={{fontSize:11,color:T.text3,padding:"4px 4px 8px",fontStyle:"italic"}}>Hover a column header for a quick definition (desktop only) · tap to jump to its full Glossary entry with formula and example.</div>
            <table style={S.table}><thead><tr>{["Yr","Home","Equity","Int","Princ","Cost","TaxB","NetBuy","Rent","RntCst","BInv","RInv","BuyW","RntW","Adv"].map(h=><th key={h} style={{...S.th,...(h==="Yr"?{textAlign:"center"}:{})}}><GlossaryLink term={h}>{h}</GlossaryLink></th>)}</tr></thead>
            <tbody>{cusR.data.map(d=>{const isH=d.year===hp,isBE=d.year===cusR.breakeven;return<tr key={d.year} style={{background:isH?"rgba(245,158,11,0.08)":isBE?"rgba(220,38,38,0.05)":d.year%2===0?T.muted:T.card}}>
              <td style={{...S.td,textAlign:"center",fontWeight:isH||isBE?700:500}}>{d.year}</td>
              <td style={S.td}>{f(d.homeVal)}</td><td style={S.td}>{f(d.equity)}</td><td style={S.td}>{f(d.yrInterest)}</td><td style={S.td}>{f(d.yrPrincipal)}</td>
              <td style={S.td}>{f(d.totalBuyerCost)}</td><td style={S.td}>{f(d.taxBenefit)}</td><td style={{...S.td,fontWeight:700}}>{f(d.netBuyerCost)}</td>
              <td style={S.td}>{f(d.annualRent)}</td><td style={{...S.td,fontWeight:700}}>{f(d.totalRenterCost)}</td>
              <td style={S.td}>{f(d.buyerPortfolio)}</td><td style={S.td}>{f(d.renterPortfolio)}</td>
              <td style={{...S.td,fontWeight:700,color:T.accent}}>{f(d.buyerWealth)}</td><td style={{...S.td,fontWeight:700,color:T.green}}>{f(d.renterWealth)}</td>
              <td style={{...S.td,fontWeight:700,color:d.advantage>=0?T.accent:T.green}}>{f(d.advantage)}</td>
            </tr>;})}</tbody></table>
          </div>}
        </div>
      </div>

      {/* FOOTER */}
      <div style={{textAlign:"center",padding:"24px 16px 32px",fontSize:11,color:T.text3,lineHeight:1.6}}>
        <div style={{marginBottom:4}}>Rent vs. Buy Financial Simulation Engine · v3.9.99.14 · Built by <a href="https://www.linkedin.com/in/allan-comeau/" target="_blank" rel="noopener" style={{color:T.accent,textDecoration:"none"}}>Allan Comeau</a> · <a href="https://github.com/allancomeau/rent-vs-buy" target="_blank" rel="noopener" style={{color:T.accent,textDecoration:"none"}}>Source on GitHub</a></div>
        <div style={{fontWeight:600,color:T.text2}}>This is an independent personal project for educational purposes only. It does not constitute financial, investment, tax, or legal advice.</div>
        <div style={{marginTop:2,color:T.text2}}>Views are the creator's own and do not represent those of any employer. Consult a qualified professional before making financial decisions.</div>
        <div style={{marginTop:4}}><a href={RESEARCH_BASE+"legal_disclaimers.md"} target="_blank" rel="noopener" style={{color:T.accent,textDecoration:"none",fontWeight:600}}>Full Legal Disclaimers & Privacy</a></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RentVsBuyV3 />);
  </script>
</body>
</html>
