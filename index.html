// ═══════════════════════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════════════════════
function backsolveLoan(monthlyPayment, annualRate, termYears) {
  const r = annualRate / 12;
  const n = termYears * 12;
  if (r <= 0) return monthlyPayment * n;
  const rn = Math.pow(1 + r, n);
  return monthlyPayment * (rn - 1) / (r * rn);
}

function simulate(p) {
  const loan = p.homePrice * (1 - p.downPct);
  const downPayment = p.homePrice * p.downPct;
  const closingCosts = p.homePrice * p.closingPct;
  const upfront = downPayment + closingCosts;
  const mr = p.mortgageRate / 12;
  const nPmts = p.mortgageTerm * 12;
  const monthlyPmt = loan > 0 && mr > 0
    ? loan * (mr * Math.pow(1 + mr, nPmts)) / (Math.pow(1 + mr, nPmts) - 1)
    : loan > 0 ? loan / nPmts : 0;
  const startRent = monthlyPmt;

  let balance = loan;
  let renterPortfolio = upfront;
  let renterBasis = upfront;
  let buyerPortfolio = 0;
  let buyerBasis = 0;
  let totalBuyerUnrecoverable = 0;
  let totalRenterUnrecoverable = 0;
  const data = [];

  for (let yr = 1; yr <= p.simYears; yr++) {
    const homeVal = p.homePrice * Math.pow(1 + p.appreciation, yr);
    const prevHomeVal = yr === 1 ? p.homePrice : p.homePrice * Math.pow(1 + p.appreciation, yr - 1);
    let yrInterest = 0, yrPrincipal = 0, yrMtgPmt = 0;
    for (let m = 0; m < 12; m++) {
      if (balance <= 0.01) { balance = 0; break; }
      const mi = balance * mr;
      const mp = Math.min(monthlyPmt - mi, balance);
      yrInterest += mi;
      yrPrincipal += mp;
      yrMtgPmt += monthlyPmt;
      balance = Math.max(0, balance - mp);
    }
    const propTax = prevHomeVal * p.propTaxRate;
    const hoIns = p.homePrice * p.insRate * Math.pow(1 + p.inflation, yr - 1);
    const maint = homeVal * p.maintRate;
    const totalBuyerCost = yrMtgPmt + propTax + hoIns + maint;
    const itemized = yrInterest + Math.min(propTax, p.saltCap) + p.otherItemized;
    const taxBenefit = Math.max(0, itemized - p.stdDeduction) * p.marginalTax;
    const netBuyerCost = totalBuyerCost - taxBenefit;
    const annualRent = startRent * 12 * Math.pow(1 + p.rentGrowth, yr - 1);
    const rIns = p.renterIns * Math.pow(1 + p.inflation, yr - 1);
    const totalRenterCost = annualRent + rIns;
    totalBuyerUnrecoverable += yrInterest + propTax + hoIns + maint - taxBenefit;
    totalRenterUnrecoverable += totalRenterCost;
    const diff = netBuyerCost - totalRenterCost;
    renterPortfolio *= (1 + p.investReturn);
    buyerPortfolio *= (1 + p.investReturn);
    if (diff > 0) { renterPortfolio += diff * p.discipline; renterBasis += diff * p.discipline; }
    else { buyerPortfolio += Math.abs(diff) * p.discipline; buyerBasis += Math.abs(diff) * p.discipline; }
    const equity = homeVal - balance;
    const sellCosts = homeVal * p.sellingPct;
    const homeGain = Math.max(0, homeVal - p.homePrice);
    const homeTax = Math.max(0, homeGain - p.capGainsExclusion) * p.capGainsRate;
    const buyerInvGain = Math.max(0, buyerPortfolio - buyerBasis);
    const buyerWealth = equity - sellCosts - homeTax + buyerPortfolio - buyerInvGain * p.capGainsRate;
    const renterGain = Math.max(0, renterPortfolio - renterBasis);
    const renterWealth = renterPortfolio - renterGain * p.capGainsRate;
    data.push({
      year: yr, homeVal, balance: Math.max(0, balance), equity,
      yrInterest, yrPrincipal, propTax, hoIns, maint,
      totalBuyerCost, taxBenefit, netBuyerCost,
      annualRent, totalRenterCost,
      renterPortfolio, buyerPortfolio,
      buyerWealth, renterWealth,
      advantage: buyerWealth - renterWealth,
    });
  }
  let breakeven = null;
  for (const d of data) { if (d.advantage >= 0) { breakeven = d.year; break; } }
  return { data, monthlyPmt, startRent, loan, upfront, breakeven, homePrice: p.homePrice, totalBuyerUnrecoverable, totalRenterUnrecoverable };
}

const fmtC = (v, s = "$") => {
  if (v == null || isNaN(v)) return "—";
  const abs = Math.abs(v); const sign = v < 0 ? "-" : "";
  if (abs >= 1e6) return sign + s + (abs / 1e6).toFixed(1) + "M";
  if (abs >= 1e3) return sign + s + Math.round(abs).toLocaleString();
  return sign + s + Math.round(abs);
};
const fmtFullC = (v, s = "$") => v == null ? "—" : (v < 0 ? "-" : "") + s + Math.round(Math.abs(v)).toLocaleString();
const fmtPct = v => (v * 100).toFixed(1) + "%";

function buildParams(country, metro, personal, rateOverride) {
  const c = COUNTRIES[country];
  const d = c.defaults;
  const nat = c.national;
  const rate = rateOverride ?? d.mortgageRate;
  const term = personal.mortgageTerm ?? d.mortgageTerm;
  const loan = backsolveLoan(personal.monthlyPayment, rate, term);
  const homePrice = loan + personal.downPayment;
  const downPct = personal.downPayment / homePrice;
  return {
    homePrice, downPct, mortgageRate: rate, mortgageTerm: term,
    appreciation: metro?.appreciation5yr ?? nat.appreciation5yr,
    rentGrowth: metro?.rentGrowth ?? nat.rentGrowth,
    inflation: d.inflation, investReturn: d.investReturn,
    propTaxRate: metro?.propTaxRate ?? nat.propTaxRate,
    maintRate: nat.maintRate,
    insRate: metro?.insRate ?? nat.insRate,
    marginalTax: d.marginalTax, stdDeduction: d.stdDeduction,
    saltCap: d.saltCap, otherItemized: personal.otherItemized ?? 0,
    capGainsRate: d.capGainsRate, capGainsExclusion: d.capGainsExclusion,
    sellingPct: d.sellingPct, closingPct: d.closingPct,
    renterIns: d.renterIns, discipline: personal.discipline ?? 1.0,
    simYears: personal.simYears ?? 30,
    holdingPeriod: personal.holdingPeriod ?? 15,
  };
}

// ═══════════════════════════════════════════════════════════════
// SENSITIVITY — runs simulate() with ±delta on each variable
// ═══════════════════════════════════════════════════════════════
function runSensitivity(params, hp) {
  const idx = Math.min(hp, params.simYears) - 1;
  const base = simulate(params).data[idx]?.advantage ?? 0;
  const tests = [
    { name: "Investment Return", key: "investReturn", delta: 0.01, fmt: "±1%" },
    { name: "Home Appreciation", key: "appreciation", delta: 0.01, fmt: "±1%" },
    { name: "Mortgage Rate", key: "mortgageRate", delta: 0.01, fmt: "±1%" },
    { name: "Rent Growth", key: "rentGrowth", delta: 0.01, fmt: "±1%" },
    { name: "Property Tax", key: "propTaxRate", delta: 0.005, fmt: "±0.5%" },
    { name: "Renter Discipline", key: "discipline", delta: 0.10, fmt: "±10%" },
  ];
  return tests.map(t => {
    const upA = simulate({ ...params, [t.key]: params[t.key] + t.delta }).data[idx]?.advantage ?? 0;
    const dnA = simulate({ ...params, [t.key]: params[t.key] - t.delta }).data[idx]?.advantage ?? 0;
    return { ...t, upA, dnA, swing: Math.abs(upA - dnA), base };
  }).sort((a, b) => b.swing - a.swing);
}

// URL STATE — shareable links
// ═══════════════════════════════════════════════════════════════
function encodeURL(country, metroId, showNat, showMetro, personal, overrides) {
  try {
    const s = { c: country, m: metroId, sn: showNat, sm: showMetro, p: personal, o: overrides };
    return window.location.pathname + "#" + btoa(JSON.stringify(s));
  } catch { return window.location.pathname; }
}
function decodeURL() {
  try {
    const h = window.location.hash;
    if (!h || h.length < 2) return null;
    return JSON.parse(atob(h.slice(1)));
  } catch { return null; }
}

// ═══════════════════════════════════════════════════════════════
// VERDICT CONFIDENCE
// ═══════════════════════════════════════════════════════════════
function verdictLabel(advantage, homePrice) {
  const pct = homePrice > 0 ? Math.abs(advantage) / homePrice : 0;
  const dir = advantage >= 0 ? "Buy" : "Rent";
  if (pct < 0.02) return { text: "Too close to call", color: "#888", strength: 0 };
  if (pct < 0.05) return { text: `Marginal ${dir}`, color: advantage >= 0 ? "#60a5fa" : "#86efac", strength: 1 };
  if (pct < 0.15) return { text: dir, color: advantage >= 0 ? "#2563eb" : "#16a34a", strength: 2 };
  return { text: `Strong ${dir}`, color: advantage >= 0 ? "#1d4ed8" : "#15803d", strength: 3 };
}

  const r = RANGES[rangeKey];
  if (!r) return null;
  const lo = r.lo * 100, hi = r.hi * 100, v = value;
  const pct = hi > lo ? Math.max(0, Math.min(100, ((v - lo) / (hi - lo)) * 100)) : 50;
  const inRange = v >= lo && v <= hi;
  return (
    <div style={S.rangeBar}>
      <span style={{ fontSize: 8, color: "#bbb", width: 24, textAlign: "right" }}>{lo.toFixed(0)}</span>
      <div style={{ flex: 1, height: 3, background: "#eee", borderRadius: 2, position: "relative" }}>
        <div style={{ position: "absolute", left: `calc(${pct}% - 3px)`, width: 6, height: 6, borderRadius: "50%", background: inRange ? "#16a34a" : "#f59e0b", top: -1.5, border: "1px solid #fff" }} />
      </div>
      <span style={{ fontSize: 8, color: "#bbb", width: 24 }}>{hi.toFixed(0)}</span>
    </div>
  );
};

const NumInput = ({ label, hint, value, onChange, step, prefix, suffix, min, max, locked, rangeKey }) => (
  <div>
    <div style={S.inputRow}>
      <span style={S.label}>{label}{locked && <span style={{ color: "#bbb", fontSize: 9 }}> 🔒</span>}</span>
      <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
        {prefix && <span style={{ fontSize: 11, color: "#888" }}>{prefix}</span>}
        <input style={locked ? S.inputLocked : S.input} type="number"
          value={value} step={step || 1} min={min} max={max}
          readOnly={locked} tabIndex={locked ? -1 : 0}
          onChange={e => { if (!locked) { const v = parseFloat(e.target.value); if (!isNaN(v)) onChange(v); } }} />
        {suffix && <span style={{ fontSize: 11, color: "#888" }}>{suffix}</span>}
      </div>
    </div>
    {rangeKey && !locked && <RangeMarker value={parseFloat(value)} rangeKey={rangeKey} />}
    {hint && <div style={S.hint}>{hint}</div>}
  </div>
);

const VerdictBox = ({ advantage, homePrice, holdYr, sym }) => {
  const v = verdictLabel(advantage, homePrice);
  const ff = val => fmtFullC(val, sym);
  return (
    <div style={{ textAlign: "center", padding: "10px 0", background: advantage >= 0 ? "#eff6ff" : "#f0fdf4", borderRadius: 6, border: `2px solid ${v.color}`, marginBottom: 10 }}>
      <div style={{ fontSize: 22, fontWeight: 800, fontFamily: "'IBM Plex Mono',monospace", color: v.color }}>{v.text.toUpperCase()}</div>
      <div style={{ fontSize: 10, color: "#666" }}>{advantage >= 0 ? "Buy" : "Rent"} wins by {ff(Math.abs(advantage))} @ Yr {holdYr}</div>
    </div>
  );
};

const MultiTooltip = ({ active, payload, sym = "$" }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: "#fff", border: "1px solid #ccc", borderRadius: 6, padding: "10px 14px", fontSize: 11, boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}>
      <div style={{ fontWeight: 700, marginBottom: 6 }}>Year {payload[0]?.payload?.year}</div>
      {payload.map((p, i) => <div key={i} style={{ color: p.color, marginBottom: 2 }}>{p.name}: {fmtFullC(p.value, sym)}</div>)}
    </div>
  );
};

const CostTooltip = ({ active, payload, sym = "$" }) => {
  if (!active || !payload?.length) return null;
  const d = payload[0]?.payload;
  if (!d) return null;
  return (
    <div style={{ background: "#fff", border: "1px solid #ccc", borderRadius: 6, padding: "10px 14px", fontSize: 11, boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}>
      <div style={{ fontWeight: 700, marginBottom: 6 }}>Year {d.year}</div>
      <div style={{ color: "#2563eb" }}>Buyer Net Cost: {fmtFullC(d.cusNetBuyer, sym)}</div>
      <div style={{ color: "#16a34a" }}>Renter Total Cost: {fmtFullC(d.cusRenterCost, sym)}</div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════════════════════
function RentVsBuyV3() {
  // Restore from URL or use defaults
  const saved = useMemo(() => decodeURL(), []);

  const [country, setCountry] = useState(saved?.c || "US");
  const [metroId, setMetroId] = useState(saved?.m || DEFAULT_METROS["US"]);
  const [showNat, setShowNat] = useState(saved?.sn ?? true);
  const [showMetro, setShowMetro] = useState(saved?.sm ?? true);
  const [showTable, setShowTable] = useState(false);
  const [showMethod, setShowMethod] = useState(false);
  const [showSources, setShowSources] = useState(false);
  const [showSensitivity, setShowSensitivity] = useState(false);
  const [presetId, setPresetId] = useState("ref");
  const [copied, setCopied] = useState(false);

  const c = COUNTRIES[country];
  const sym = c.sym;
  const f = v => fmtC(v, sym);
  const ff = v => fmtFullC(v, sym);

  const [personal, setPersonal] = useState(saved?.p || {
    monthlyPayment: c.personalDefaults.monthlyPayment,
    downPayment: c.personalDefaults.downPayment,
    mortgageTerm: c.defaults.mortgageTerm,
    holdingPeriod: 15, simYears: 30, discipline: 1.0, otherItemized: 0,
  });
  const up = (key) => (val) => setPersonal(prev => ({ ...prev, [key]: val }));

  const [customOverrides, setCustomOverrides] = useState(saved?.o || {});
  const uc = (key, val) => setCustomOverrides(prev => ({ ...prev, [key]: val }));

  const metro = METROS.find(m => m.id === metroId);
  const countryMetros = METROS.filter(m => m.country === country);

  // Build params — national, metro (optional), custom
  const nationalParams = useMemo(() => buildParams(country, null, personal), [country, personal]);
  const regionalParams = useMemo(() => metro ? buildParams(country, metro, personal) : null, [country, metro, personal]);
  const customParams = useMemo(() => {
    const rateOverride = customOverrides.mortgageRate;
    const base = buildParams(country, metro, personal, rateOverride);
    const { mortgageRate: _, ...rest } = customOverrides;
    return { ...base, ...rest };
  }, [country, metro, personal, customOverrides]);

  // Run simulations
  const natResult = useMemo(() => simulate(nationalParams), [nationalParams]);
  const regResult = useMemo(() => regionalParams ? simulate(regionalParams) : null, [regionalParams]);
  const cusResult = useMemo(() => simulate(customParams), [customParams]);

  const hp = personal.holdingPeriod;
  const cusAtHold = cusResult.data[Math.min(hp, customParams.simYears) - 1];
  const natAtHold = natResult.data[Math.min(hp, nationalParams.simYears) - 1];
  const regAtHold = regResult?.data[Math.min(hp, (regionalParams?.simYears || 30)) - 1];

  // Chart data
  const chartData = useMemo(() => cusResult.data.map((d, i) => ({
    year: d.year,
    cusAdv: d.advantage,
    cusBuyer: d.buyerWealth,
    cusRenter: d.renterWealth,
    cusNetBuyer: d.netBuyerCost,
    cusRenterCost: d.totalRenterCost,
    ...(showNat ? { natAdv: natResult.data[i]?.advantage } : {}),
    ...(showMetro && regResult ? { regAdv: regResult.data[i]?.advantage } : {}),
  })), [cusResult, natResult, regResult, showNat, showMetro]);

  // Sensitivity
  const sensitivity = useMemo(() => showSensitivity ? runSensitivity(customParams, hp) : [], [customParams, hp, showSensitivity]);

  // Break-even sensitivity sentence
  const beSens = useMemo(() => {
    const lo = simulate({ ...customParams, appreciation: customParams.appreciation - 0.01 });
    const hi = simulate({ ...customParams, appreciation: customParams.appreciation + 0.01 });
    return { loBE: lo.breakeven, hiBE: hi.breakeven };
  }, [customParams]);

  // Input warnings (custom scenario)
  const warnings = useMemo(() => {
    const w = [];
    const { investReturn: ir, appreciation: ap, rentGrowth: rg, propTaxRate: pt, insRate: ins, mortgageRate: mr } = customParams;
    const dp = personal.downPayment;
    const derivedPrice = cusResult.homePrice;
    const downPctImpl = derivedPrice > 0 ? dp / derivedPrice : 0;
    if (personal.monthlyPayment < 500) w.push("Monthly payment below " + sym + "500 produces a very small derived home price.");
    if (ir > 0.12) w.push("Investment return " + fmtPct(ir) + " exceeds the S&P 500 arithmetic mean (~12%). The model compounds geometrically — 10% is the benchmark.");
    if (ir < 0.05) w.push("Investment return below 5% is below long-run bond returns. Strongly favors buying.");
    if (ap > 0.08) w.push("No major metro has sustained " + fmtPct(ap) + " appreciation over a full cycle.");
    if (ap < 0) w.push("Negative appreciation assumes the home loses value every year.");
    if (rg > 0.06) w.push("Rent growth above 6% has only been seen in a few post-pandemic hotspots.");
    if (pt > 0.025) w.push("Property tax " + fmtPct(pt) + " would be among the highest in the US (NJ ~2.2%).");
    if (ins > 0.02) w.push("Insurance " + fmtPct(ins) + " is FL/LA disaster-area territory.");
    if (mr > 0.09) w.push("Mortgage rate " + fmtPct(mr) + " hasn't been seen since the early 1990s.");
    if (hp < 3) w.push("At a " + hp + "-year hold, ~9% round-trip transaction costs overwhelm appreciation.");
    if (downPctImpl > 0 && downPctImpl < 0.05) w.push("Implied down payment is " + (downPctImpl * 100).toFixed(0) + "% — PMI would apply (not modeled).");
    if (downPctImpl > 0.5) w.push("Implied down payment is " + (downPctImpl * 100).toFixed(0) + "% — unusual.");
    return w;
  }, [customParams, personal, cusResult, sym, hp]);

  // URL sharing
  const shareURL = useCallback(() => {
    const url = encodeURL(country, metroId, showNat, showMetro, personal, customOverrides);
    history.replaceState(null, "", url);
    navigator.clipboard?.writeText(window.location.origin + url).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  }, [country, metroId, showNat, showMetro, personal, customOverrides]);

  // Insight builder
  const buildInsight = (label, params, res) => {
    const at = res.data[Math.min(hp, params.simYears) - 1];
    const spread = ((params.investReturn - params.mortgageRate) * 100).toFixed(1);
    const cross = res.data.find(d => d.totalRenterCost > d.netBuyerCost);
    const paid = res.data.find(d => d.balance === 0);
    let t = `${label}: `;
    if (res.breakeven && res.breakeven <= params.simYears) {
      t += `Breakeven year ${res.breakeven}. `;
      if (paid) t += `Mortgage paid off year ${paid.year}. `;
      if (cross) t += `Rent exceeds buyer costs from year ${cross.year}. `;
    } else {
      t += `Renting wins across all ${params.simYears} years (${spread}% return-rate spread). `;
    }
    t += at?.advantage >= 0 ? `At year ${hp}: buying wins by ${ff(at.advantage)}.` : `At year ${hp}: renting wins by ${ff(Math.abs(at.advantage))}.`;
    return t;
  };

  // Volatility drag constants
  const EQ_VOL = 0.16, HO_VOL = 0.08;
  const eqDrag = (EQ_VOL * EQ_VOL) / 2, hoDrag = (HO_VOL * HO_VOL) / 2;

  return (
    <div style={S.page}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
        <div>
          <h1 style={S.h1}>Rent vs. Buy: Financial Simulation Engine</h1>
          <div style={S.sub}>v3 · {METROS.length} metros · 16 countries · Sensitivity analysis · Shareable URLs</div>
        </div>
        <button style={S.btn} onClick={shareURL}>{copied ? "✓ Copied!" : "Share Link"}</button>
      </div>

      {/* ═══ HOW TO READ THIS ═══ */}
      <details style={{ marginBottom: 12, background: "#fff", border: "1px solid #e0e0e0", borderRadius: 8, padding: "0 16px" }}>
        <summary style={{ padding: "10px 0", cursor: "pointer", fontSize: 13, fontWeight: 600, color: "#555" }}>How to Read This Model</summary>
        <div style={{ paddingBottom: 14, fontSize: 12, lineHeight: 1.7, color: "#555" }}>
          <p style={{ marginTop: 8 }}><strong>What it does:</strong> Compares two wealth paths — buying a home vs. renting and investing the difference — starting from the same monthly payment. Shows which builds more net wealth over your chosen time horizon.</p>
          <p><strong>Two panels:</strong> The Reference panel shows real market data (locked). Your Scenario panel lets you override everything and test "what if" cases. Load a preset or build your own.</p>
          <p><strong>Start here:</strong> Set your actual rent as "Monthly Payment" and realistic savings as "Down Payment." Adjust "Sell House in Year" to how long you'd stay. Then change Renter Discipline — 100% = theoretical best case for renting, 70% = realistic.</p>
          <p><strong>The dot on each input</strong> shows where your value sits in the historical range (green = within bounds, amber = outside). The sensitivity table shows which variables actually matter most for YOUR numbers.</p>
        </div>
      </details>

      {/* ═══ LOCATION + TOGGLES ═══ */}
      <div style={{ display: "flex", gap: 16, marginBottom: 12, alignItems: "flex-end", flexWrap: "wrap" }}>
        <div>
          <label style={{ fontSize: 10, fontWeight: 600, color: "#555", display: "block", marginBottom: 3 }}>Country</label>
          <select style={S.select} value={country} onChange={e => {
            const nc = e.target.value;
            setCountry(nc);
            setMetroId(DEFAULT_METROS[nc] || "");
            setCustomOverrides({});
            setPresetId("ref");
            const nd = COUNTRIES[nc];
            setPersonal(prev => ({ ...prev, monthlyPayment: nd.personalDefaults.monthlyPayment, downPayment: nd.personalDefaults.downPayment, mortgageTerm: nd.defaults.mortgageTerm }));
          }}>
            {Object.entries(COUNTRIES).map(([k, v]) => <option key={k} value={k}>{v.name}</option>)}
          </select>
        </div>
        <div>
          <label style={{ fontSize: 10, fontWeight: 600, color: "#555", display: "block", marginBottom: 3 }}>Metro</label>
          <select style={{ ...S.select, minWidth: 240 }} value={metroId} onChange={e => { setMetroId(e.target.value); setCustomOverrides({}); setPresetId("ref"); }}>
            {countryMetros.map(m => <option key={m.id} value={m.id}>{m.name}{m.state ? ` (${m.state})` : ""}</option>)}
          </select>
        </div>
        <label style={{ fontSize: 11, color: "#555", display: "flex", alignItems: "center", gap: 4 }}>
          <input type="checkbox" checked={showNat} onChange={e => setShowNat(e.target.checked)} /> Show national avg
        </label>
        <label style={{ fontSize: 11, color: "#555", display: "flex", alignItems: "center", gap: 4 }}>
          <input type="checkbox" checked={showMetro} onChange={e => setShowMetro(e.target.checked)} /> Show metro
        </label>
        <div style={{ fontSize: 9, color: "#aaa", maxWidth: 200, lineHeight: 1.4 }}>
          All values in {c.currency} ({sym}).
        </div>
      </div>

      {/* ═══ CORE PREMISE ═══ */}
      <div style={S.premise}>
        <div style={S.premiseLabel}>Core Premise</div>
        <div style={{ fontSize: 14, fontWeight: 600 }}>
          Starting Monthly Rent = Monthly Mortgage P&I = <span style={{ fontFamily: "'IBM Plex Mono',monospace", color: "#2563eb" }}>{ff(personal.monthlyPayment)}/mo</span>
        </div>
        <div style={{ fontSize: 11, color: "#666", marginTop: 2 }}>
          Both paths start from the same cash outflow. Rent grows; mortgage stays fixed.
          Derived home price: {showNat && <>National {ff(natResult.homePrice)} · </>}{showMetro && regResult && <>{metro?.name} {ff(regResult.homePrice)} · </>}Custom {ff(cusResult.homePrice)}
        </div>
      </div>

      {/* ═══ PERSONAL VARIABLES ═══ */}
      <div style={{ ...S.section, marginBottom: 12 }}>
        <div style={S.sectionTitle}>Your Situation (shared across all scenarios)</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 16 }}>
          <div>
            <NumInput label="Monthly Payment" value={personal.monthlyPayment} onChange={up("monthlyPayment")} step={100} prefix={sym} hint="Your current rent / mortgage P&I" />
            <NumInput label="Down Payment" value={personal.downPayment} onChange={up("downPayment")} step={5000} prefix={sym} hint={`Cash · ~${cusResult.homePrice > 0 ? (personal.downPayment / cusResult.homePrice * 100).toFixed(0) : "—"}% of derived price`} />
          </div>
          <div>
            <NumInput label="Mortgage Term" value={personal.mortgageTerm} onChange={up("mortgageTerm")} step={1} suffix="yr" />
            <NumInput label="Sell House in Year" value={hp} onChange={v => up("holdingPeriod")(Math.min(v, personal.simYears))} step={1} suffix="yr" hint="How long you'd own" />
          </div>
          <div>
            <NumInput label="Simulation Length" value={personal.simYears} onChange={v => setPersonal(prev => ({ ...prev, simYears: v, holdingPeriod: Math.min(prev.holdingPeriod, v) }))} step={1} suffix="yr" min={1} max={65} />
            <NumInput label="Renter Discipline" value={(personal.discipline * 100).toFixed(0)} onChange={v => up("discipline")(v / 100)} step={5} suffix="%" hint="% of savings invested. 60-75% realistic" />
          </div>
          <div>
            <NumInput label="Marginal Tax Rate" value={(c.defaults.marginalTax * 100).toFixed(0)} onChange={() => {}} suffix="%" locked hint={c.defaults.marginalTax > 0 ? "Mortgage interest deductible" : "No deduction in this country"} />
            {c.defaults.marginalTax > 0 && <NumInput label="Other Itemized Ded." value={personal.otherItemized} onChange={up("otherItemized")} step={1000} prefix={sym} />}
          </div>
        </div>
        {/* Tax note */}
        {c.taxNote.includes("⚠️") ? (
          <div style={{ fontSize: 12, color: "#7a4f00", marginTop: 8, padding: "10px 14px", background: "#fff3cd", borderRadius: 6, border: "2px solid #ffc107", lineHeight: 1.6, fontWeight: 500 }}>
            <strong style={{ fontSize: 13 }}>⚠️ {c.name} — Important Disclaimer</strong>
            <div style={{ marginTop: 4, fontWeight: 400 }}>{c.taxNote.replace("⚠️ ", "")}</div>
          </div>
        ) : (
          <div style={{ fontSize: 11, color: "#666", marginTop: 8, padding: "8px 12px", background: "#f8f8f8", borderRadius: 6, lineHeight: 1.5 }}>
            <strong>{c.name}:</strong> {c.taxNote}
          </div>
        )}
        {/* Volatility drag */}
        <div style={{ fontSize: 11, color: "#555", marginTop: 8, padding: "8px 12px", background: "#f0f4ff", borderRadius: 6, border: "1px solid #d0d8f0", lineHeight: 1.6 }}>
          <strong>Why geometric returns (CAGR):</strong> Stocks lose ~{fmtPct(eqDrag)} to volatility drag (σ≈{(EQ_VOL*100).toFixed(0)}%), housing loses only ~{fmtPct(hoDrag)} (σ≈{(HO_VOL*100).toFixed(0)}%). Using 12% instead of 10% for stocks overstates the renter's portfolio by ~50-70% over 30 years. <span style={{ color: "#888" }}>(Kitces, Jacquier-Kane-Marcus 2003)</span>
        </div>
        {/* Warnings */}
        {warnings.length > 0 && (
          <div style={{ marginTop: 8, padding: "8px 12px", background: "#fff8e6", borderRadius: 6, border: "1px solid #f0d860", fontSize: 11, lineHeight: 1.6 }}>
            <strong style={{ color: "#b8860b" }}>Heads up:</strong>
            {warnings.map((w, i) => <div key={i} style={{ marginTop: 3, color: "#7a6520" }}>• {w}</div>)}
          </div>
        )}
      </div>

      {/* ═══ TWO-PANEL LAYOUT ═══ */}
      <div style={S.panels}>
        {/* LEFT — REFERENCE */}
        <div style={S.panel}>
          <div style={{ ...S.panelHead, background: "#f0f4ff", color: "#2563eb", borderBottom: "2px solid #2563eb" }}>Reference Data</div>
          <div style={S.panelBody}>
            {showNat && (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#555", marginBottom: 6 }}>{c.name} National</div>
                <VerdictBox advantage={natAtHold?.advantage} homePrice={natResult.homePrice} holdYr={hp} sym={sym} />
                <div style={S.derived}>
                  <div>Home: {ff(natResult.homePrice)} · Loan: {ff(natResult.loan)}</div>
                  <div>Breakeven: <strong>{natResult.breakeven ? `Year ${natResult.breakeven}` : "Never"}</strong></div>
                </div>
                <div style={{ fontSize: 10, color: "#888" }}>
                  Appr {fmtPct(nationalParams.appreciation)} · Rent gr {fmtPct(nationalParams.rentGrowth)} · Prop tax {fmtPct(nationalParams.propTaxRate)} · Ins {fmtPct(nationalParams.insRate)}
                </div>
              </div>
            )}
            {showMetro && regResult && (
              <div style={{ marginBottom: 8, ...(showNat ? { borderTop: "1px solid #eee", paddingTop: 12 } : {}) }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#555", marginBottom: 6 }}>{metro?.name}</div>
                <VerdictBox advantage={regAtHold?.advantage} homePrice={regResult.homePrice} holdYr={hp} sym={sym} />
                <div style={S.derived}>
                  <div>Home: {ff(regResult.homePrice)} · Loan: {ff(regResult.loan)}</div>
                  <div>Breakeven: <strong>{regResult.breakeven ? `Year ${regResult.breakeven}` : "Never"}</strong></div>
                </div>
                <div style={{ fontSize: 10, color: "#888" }}>
                  Appr {fmtPct(regionalParams.appreciation)} · Rent gr {fmtPct(regionalParams.rentGrowth)} · Prop tax {fmtPct(regionalParams.propTaxRate)} · Ins {fmtPct(regionalParams.insRate)}
                </div>
              </div>
            )}
            {!showNat && !showMetro && <div style={{ fontSize: 12, color: "#aaa", padding: 20, textAlign: "center" }}>Toggle national or metro above to show reference data.</div>}
          </div>
        </div>

        {/* RIGHT — CUSTOM */}
        <div style={S.panel}>
          <div style={{ ...S.panelHead, background: "#fafafa", color: "#555", borderBottom: "2px solid #555", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>Your Scenario</span>
            <select style={{ ...S.select, fontSize: 11 }} value={presetId} onChange={e => {
              const p = PRESETS.find(x => x.id === e.target.value);
              setPresetId(e.target.value);
              setCustomOverrides(p ? { ...p.overrides } : {});
            }}>
              {PRESETS.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div style={S.panelBody}>
            <VerdictBox advantage={cusAtHold?.advantage} homePrice={cusResult.homePrice} holdYr={hp} sym={sym} />
            <div style={S.derived}>
              <div>Home: {ff(cusResult.homePrice)} · Loan: {ff(cusResult.loan)} · Upfront: {ff(cusResult.upfront)}</div>
              <div>Breakeven: <strong>{cusResult.breakeven ? `Year ${cusResult.breakeven}` : "Never"}</strong>
                {beSens.loBE !== cusResult.breakeven && <span style={{ fontSize: 10, color: "#888" }}> (at appr {fmtPct(customParams.appreciation - 0.01)}: {beSens.loBE ? `Yr ${beSens.loBE}` : "Never"} · at {fmtPct(customParams.appreciation + 0.01)}: {beSens.hiBE ? `Yr ${beSens.hiBE}` : "Never"})</span>}
              </div>
            </div>
            <div style={{ ...S.sectionTitle, fontSize: 10 }}>Market Variables</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
              <NumInput label="Mortgage Rate" value={(customParams.mortgageRate * 100).toFixed(1)} onChange={v => uc("mortgageRate", v / 100)} step={0.1} suffix="%" rangeKey="mortgageRate" hint="Changes derived home price" />
              <NumInput label="Investment Return" value={(customParams.investReturn * 100).toFixed(1)} onChange={v => uc("investReturn", v / 100)} step={0.1} suffix="%" rangeKey="investReturn" />
              <NumInput label="Appreciation" value={(customParams.appreciation * 100).toFixed(1)} onChange={v => uc("appreciation", v / 100)} step={0.1} suffix="%" rangeKey="appreciation" />
              <NumInput label="Rent Growth" value={(customParams.rentGrowth * 100).toFixed(1)} onChange={v => uc("rentGrowth", v / 100)} step={0.1} suffix="%" rangeKey="rentGrowth" />
              <NumInput label="Property Tax" value={(customParams.propTaxRate * 100).toFixed(2)} onChange={v => uc("propTaxRate", v / 100)} step={0.01} suffix="%" rangeKey="propTaxRate" />
              <NumInput label="Insurance" value={(customParams.insRate * 100).toFixed(2)} onChange={v => uc("insRate", v / 100)} step={0.01} suffix="%" rangeKey="insRate" />
              <NumInput label="Maintenance" value={(customParams.maintRate * 100).toFixed(1)} onChange={v => uc("maintRate", v / 100)} step={0.1} suffix="%" rangeKey="maintRate" />
            </div>
          </div>
        </div>
      </div>

      {/* ═══ INSIGHT ═══ */}
      <div style={S.insight}>
        <div style={{ fontWeight: 700, marginBottom: 6, fontSize: 11, textTransform: "uppercase", letterSpacing: 0.5 }}>Dynamic Insight</div>
        {showNat && <div style={{ marginBottom: 4 }}>{buildInsight(`${c.name} National`, nationalParams, natResult)}</div>}
        {showMetro && regResult && <div style={{ marginBottom: 4 }}>{buildInsight(metro?.name || "Metro", regionalParams, regResult)}</div>}
        <div style={{ marginBottom: 8 }}>{buildInsight("Your Scenario", customParams, cusResult)}</div>
        <div style={{ borderTop: "1px solid #e8d44d", paddingTop: 8, fontSize: 12, color: "#666" }}>
          <strong>Unrecoverable costs (Your Scenario, {customParams.simYears}yr):</strong> Buyer "throws away" {ff(cusResult.totalBuyerUnrecoverable)} (interest, tax, insurance, maintenance − tax benefit). Renter pays {ff(cusResult.totalRenterUnrecoverable)} in rent + insurance. Neither side's money is "free."
        </div>
      </div>

      {/* ═══ ADVANTAGE CHART ═══ */}
      <div style={S.chart}>
        <div style={S.chartTitle}>Buy vs. Rent Advantage Over Time</div>
        <div style={S.chartSub}>Positive = buying wins · Negative = renting wins</div>
        <ResponsiveContainer width="100%" height={320}>
          <LineChart data={chartData} margin={{ top: 5, right: 30, left: 20, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
            <XAxis dataKey="year" tick={{ fontSize: 10 }} tickFormatter={v => v % 5 === 0 ? v : ""} />
            <YAxis tick={{ fontSize: 10 }} tickFormatter={v => fmtC(v, sym)} width={65} />
            <Tooltip content={<MultiTooltip sym={sym} />} />
            <Legend wrapperStyle={{ fontSize: 11 }} />
            <ReferenceLine y={0} stroke="#333" strokeWidth={1} />
            <ReferenceLine x={hp} stroke="#f59e0b" strokeDasharray="6 4" strokeWidth={2} label={{ value: `Yr ${hp}`, position: "top", fontSize: 10, fill: "#f59e0b" }} />
            <Line type="monotone" dataKey="cusAdv" name="Your Scenario" stroke="#555" strokeWidth={2.5} dot={false} />
            {showNat && <Line type="monotone" dataKey="natAdv" name={`${c.name} Avg`} stroke="#2563eb" strokeWidth={1.5} dot={false} strokeDasharray="5 3" />}
            {showMetro && regResult && <Line type="monotone" dataKey="regAdv" name={metro?.name || "Metro"} stroke="#16a34a" strokeWidth={1.5} dot={false} strokeDasharray="5 3" />}
          </LineChart>
        </ResponsiveContainer>
      </div>

      {/* ═══ WEALTH CHART ═══ */}
      <div style={S.chart}>
        <div style={S.chartTitle}>Your Scenario: Buyer vs. Renter Net Wealth</div>
        <div style={S.chartSub}>Buyer = Equity − Selling Costs − Cap Gains + Portfolio · Renter = Portfolio − Cap Gains</div>
        <ResponsiveContainer width="100%" height={280}>
          <LineChart data={chartData} margin={{ top: 5, right: 30, left: 20, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
            <XAxis dataKey="year" tick={{ fontSize: 10 }} tickFormatter={v => v % 5 === 0 ? v : ""} />
            <YAxis tick={{ fontSize: 10 }} tickFormatter={v => fmtC(v, sym)} width={65} />
            <Tooltip content={<MultiTooltip sym={sym} />} />
            <Legend wrapperStyle={{ fontSize: 11 }} />
            <ReferenceLine x={hp} stroke="#f59e0b" strokeDasharray="6 4" strokeWidth={2} />
            {cusResult.breakeven && <ReferenceLine x={cusResult.breakeven} stroke="#dc2626" strokeDasharray="4 4" label={{ value: "Break-even", position: "top", fontSize: 10, fill: "#dc2626" }} />}
            <Line type="monotone" dataKey="cusBuyer" name="Buyer Wealth" stroke="#2563eb" strokeWidth={2.5} dot={false} />
            <Line type="monotone" dataKey="cusRenter" name="Renter Wealth" stroke="#16a34a" strokeWidth={2.5} dot={false} />
          </LineChart>
        </ResponsiveContainer>
      </div>

      {/* ═══ ANNUAL COST CHART ═══ */}
      <div style={S.chart}>
        <div style={S.chartTitle}>Your Scenario: Annual Housing Cost — Buyer vs. Renter</div>
        <div style={S.chartSub}>When lines cross, the cost advantage flips — but the renter may already have a compounding lead.</div>
        <ResponsiveContainer width="100%" height={260}>
          <LineChart data={chartData} margin={{ top: 5, right: 30, left: 20, bottom: 5 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
            <XAxis dataKey="year" tick={{ fontSize: 10 }} tickFormatter={v => v % 5 === 0 ? v : ""} />
            <YAxis tick={{ fontSize: 10 }} tickFormatter={v => fmtC(v, sym)} width={65} />
            <Tooltip content={<CostTooltip sym={sym} />} />
            <Legend wrapperStyle={{ fontSize: 11 }} />
            {customParams.mortgageTerm <= customParams.simYears && <ReferenceLine x={customParams.mortgageTerm} stroke="#888" strokeDasharray="4 4" label={{ value: "Mortgage paid off", position: "top", fontSize: 10, fill: "#888" }} />}
            <Line type="monotone" dataKey="cusNetBuyer" name="Buyer Net Cost" stroke="#2563eb" strokeWidth={2} dot={false} />
            <Line type="monotone" dataKey="cusRenterCost" name="Renter Total Cost" stroke="#16a34a" strokeWidth={2} dot={false} />
          </LineChart>
        </ResponsiveContainer>
      </div>

      {/* ═══ SENSITIVITY TABLE ═══ */}
      <div style={{ marginBottom: 16 }}>
        <button style={S.toggle} onClick={() => setShowSensitivity(!showSensitivity)}>
          {showSensitivity ? "▼ Hide" : "▶ Show"} Sensitivity Analysis — Which assumptions matter most?
        </button>
        {showSensitivity && sensitivity.length > 0 && (
          <div style={{ ...S.section, marginTop: 10 }}>
            <div style={{ fontSize: 11, color: "#666", marginBottom: 10 }}>Each row shows how much the outcome swings when one variable changes, holding everything else constant. Sorted by impact.</div>
            <table style={S.table}>
              <thead>
                <tr>
                  <th style={{ ...S.th, textAlign: "left" }}>Variable</th>
                  <th style={S.th}>Change</th>
                  <th style={S.th}>If Higher</th>
                  <th style={S.th}>If Lower</th>
                  <th style={S.th}>Total Swing</th>
                </tr>
              </thead>
              <tbody>
                {sensitivity.map((s, i) => (
                  <tr key={s.key} style={{ background: i === 0 ? "#fff7ed" : i % 2 === 0 ? "#fafafa" : "#fff" }}>
                    <td style={{ ...S.td, textAlign: "left", fontWeight: i < 2 ? 700 : 400 }}>{s.name}{i === 0 && " ★"}</td>
                    <td style={S.td}>{s.fmt}</td>
                    <td style={{ ...S.td, color: s.upA >= 0 ? "#2563eb" : "#16a34a" }}>{f(s.upA)}</td>
                    <td style={{ ...S.td, color: s.dnA >= 0 ? "#2563eb" : "#16a34a" }}>{f(s.dnA)}</td>
                    <td style={{ ...S.td, fontWeight: 700 }}>{f(s.swing)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{ fontSize: 10, color: "#999", marginTop: 8 }}>
              ★ = Most impactful variable. If the top two variables' swings exceed your advantage, the verdict is fragile — small assumption changes flip it.
            </div>
          </div>
        )}
      </div>

      {/* ═══ SOURCES ═══ */}
      <div style={{ marginBottom: 12 }}>
        <button style={S.toggle} onClick={() => setShowSources(!showSources)}>
          {showSources ? "▼ Hide" : "▶ Show"} Location Reference Data & Sources ({countryMetros.length} metros)
        </button>
        {showSources && (
          <div style={{ ...S.section, marginTop: 10, maxHeight: 400, overflowY: "auto" }}>
            <table style={S.table}>
              <thead><tr>
                <th style={{ ...S.th, textAlign: "left" }}>Metro</th>
                <th style={S.th}>Appr 5yr</th><th style={S.th}>Appr 10yr</th>
                <th style={S.th}>Rent Gr</th><th style={S.th}>Prop Tax</th><th style={S.th}>Ins</th>
                <th style={{ ...S.th, textAlign: "left" }}>Sources</th>
              </tr></thead>
              <tbody>
                <tr style={{ background: "#f0f4ff", fontWeight: 600 }}>
                  <td style={{ ...S.td, textAlign: "left" }}>{c.name} National</td>
                  <td style={S.td}>{fmtPct(c.national.appreciation5yr)}</td><td style={S.td}>{fmtPct(c.national.appreciation10yr)}</td>
                  <td style={S.td}>{fmtPct(c.national.rentGrowth)}</td><td style={S.td}>{fmtPct(c.national.propTaxRate)}</td><td style={S.td}>{fmtPct(c.national.insRate)}</td>
                  <td style={{ ...S.td, textAlign: "left", fontSize: 9 }}>{c.national.sources}</td>
                </tr>
                {countryMetros.map(m => (
                  <tr key={m.id} style={{ background: m.id === metroId ? "#f0fdf4" : undefined }}>
                    <td style={{ ...S.td, textAlign: "left", fontWeight: m.id === metroId ? 700 : 400 }}>{m.name}</td>
                    <td style={S.td}>{fmtPct(m.appreciation5yr)}</td><td style={S.td}>{fmtPct(m.appreciation10yr)}</td>
                    <td style={S.td}>{fmtPct(m.rentGrowth)}</td><td style={S.td}>{fmtPct(m.propTaxRate)}</td><td style={S.td}>{fmtPct(m.insRate)}</td>
                    <td style={{ ...S.td, textAlign: "left", fontSize: 9 }}>{m.sources}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* ═══ DATA TABLE ═══ */}
      <div style={{ marginBottom: 12 }}>
        <button style={S.toggle} onClick={() => setShowTable(!showTable)}>
          {showTable ? "▼ Hide" : "▶ Show"} Year-by-Year Data (Your Scenario)
        </button>
        {showTable && (
          <div style={{ maxHeight: 400, overflowY: "auto", marginTop: 10, border: "1px solid #e0e0e0", borderRadius: 8 }}>
            <table style={S.table}>
              <thead><tr>
                {["Yr","Home","Equity","Int","Princ","Buyer$","TaxBen","NetBuy","Rent$","RntCost","BuyInv","RntInv","BuyerW","RenterW","Adv"].map(h => (
                  <th key={h} style={{ ...S.th, ...(h === "Yr" ? { textAlign: "center" } : {}) }}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {cusResult.data.map(d => {
                  const isH = d.year === hp, isBE = d.year === cusResult.breakeven;
                  const bg = isH ? "#fff7ed" : isBE ? "#fef2f2" : d.year % 2 === 0 ? "#fafafa" : "#fff";
                  return (
                    <tr key={d.year} style={{ background: bg }}>
                      <td style={{ ...S.td, textAlign: "center", fontWeight: isH || isBE ? 700 : 400 }}>{d.year}</td>
                      <td style={S.td}>{f(d.homeVal)}</td><td style={S.td}>{f(d.equity)}</td>
                      <td style={S.td}>{f(d.yrInterest)}</td><td style={S.td}>{f(d.yrPrincipal)}</td>
                      <td style={S.td}>{f(d.totalBuyerCost)}</td><td style={S.td}>{f(d.taxBenefit)}</td>
                      <td style={{ ...S.td, fontWeight: 600 }}>{f(d.netBuyerCost)}</td>
                      <td style={S.td}>{f(d.annualRent)}</td>
                      <td style={{ ...S.td, fontWeight: 600 }}>{f(d.totalRenterCost)}</td>
                      <td style={S.td}>{f(d.buyerPortfolio)}</td><td style={S.td}>{f(d.renterPortfolio)}</td>
                      <td style={{ ...S.td, fontWeight: 700, color: "#2563eb" }}>{f(d.buyerWealth)}</td>
                      <td style={{ ...S.td, fontWeight: 700, color: "#16a34a" }}>{f(d.renterWealth)}</td>
                      <td style={{ ...S.td, fontWeight: 700, color: d.advantage >= 0 ? "#2563eb" : "#16a34a" }}>{f(d.advantage)}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* ═══ METHODOLOGY ═══ */}
      <div style={{ marginBottom: 24 }}>
        <button style={S.toggle} onClick={() => setShowMethod(!showMethod)}>
          {showMethod ? "▼ Hide" : "▶ Show"} Methodology & Sources
        </button>
        {showMethod && (
          <div style={{ ...S.section, marginTop: 10, fontSize: 12, lineHeight: 1.8, color: "#555" }}>
            <p><strong>Monthly-Payment-First:</strong> Input monthly payment + down payment. Engine backsolves loan: L = M × [(1+r)^n − 1] / [r × (1+r)^n], derives homePrice = L + down. Same payment at different rates → different home prices.</p>
            <p><strong>Two-Panel Layout:</strong> Reference panel shows locked national/metro data (toggleable). Your Scenario panel is fully editable with preset market conditions. Personal variables shared across all.</p>
            <p><strong>Sensitivity Analysis:</strong> Runs simulate() with ±delta on each variable, measures swing at your holding period. Sorted by impact. If the top variable's swing exceeds your advantage, the verdict is fragile.</p>
            <p><strong>Verdict Confidence:</strong> Based on advantage as % of home price. &lt;2% = too close to call, &lt;5% = marginal, &lt;15% = moderate, ≥15% = strong.</p>
            <p><strong>Amortization:</strong> Month-precise. Interest = Balance × (Rate/12), Principal = Payment − Interest.</p>
            <p><strong>Tax Benefit:</strong> Excess itemization: max(0, Itemized − Std Deduction) × Rate. US only — all other countries correctly produce $0 benefit (marginalTax = 0). Netherlands and Sweden have partial deductions modeled.</p>
            <p><strong>Symmetric Surplus Investing:</strong> Whoever has lower costs invests the difference (adjusted by discipline %).</p>
            <p><strong>International Tax Buckets:</strong> Bucket A (no deduction): CA, UK, AU, DE, IE, NZ, FR, ES, IT, and most of the world. Bucket B (partial deduction): NL, SE, CH. US is the global outlier with full mortgage interest deduction. Japan, Singapore, South Korea have structural disclaimers.</p>
            <p style={{ color: "#888", fontSize: 11 }}><strong>Sources:</strong> Poterba (QJE 1984) · Shiller · Jordà-Schularick-Taylor (QJE 2019) · Himmelberg-Mayer-Sinai (JEP 2005) · Bernstein-Koudijs (QJE 2024) · Ben Felix / PWL Capital · UBS RE Bubble Index 2025</p>
            <p style={{ color: "#dc2626", fontSize: 11, marginTop: 8 }}>Educational and discussion purposes only. Not financial advice.</p>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RentVsBuyV3 />);
  </script>
</body>
</html>
